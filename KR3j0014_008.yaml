body:
  text: 勉學篇八自古明王聖帝猶須勤學況凡庶乎此事遍於經史吾亦不能鄭重聊舉近世切要以啟寤汝耳士大夫子弟數歲已上莫不被教多者或至禮傳少者不失詩論及至冠婚體性稍定因此天機倍須訓誘有志尚者遂能磨礪以就素業無履立者自茲墮慢便為凡人人生在世會當有業農民則計量耕稼商賈則討論貨賄工巧則致精器用伎藝則沈思法術武夫則慣習弓馬文士則講議經書多見士大夫恥涉農商羞務工伎射既不能穿札筆則纔記姓名飽食醉酒忽忽無事以此銷日以此終年或因家世餘緒得一階半級便謂為足安能自苦及有吉凶大事議論得失蒙然張口如坐雲霧公私宴集談古賦詩塞默低頭欠伸而已有識旁觀代其入地何惜數年勤學長受一生愧辱哉梁朝全盛之時貴遊子弟多無學術至於諺云上車不落則著作體中何如則祕書無不熏衣剃面傅粉施朱駕長簷車跟高齒屐坐碁子方褥憑斑絲隱囊列器玩於左右從容出入望若神仙明經求第則顧人答策三九公讌則假手賦詩當爾之時亦快士也及離亂之後朝市遷革銓衡選舉非復曩者之親當路秉權不見昔時之黨求諸身而無所得施之世而無所用披褐而喪珠失皮而露質兀若枯木泊若窮流鹿獨戎馬之間轉死溝壑之際當爾之時誠駑材也有學藝者觸地而安自荒亂已來諸見俘虜雖百世小人知讀論語孝經者尚為人師雖千載冠冕不曉書記者莫不耕田養馬以此觀之安可不自勉耶若能常保數百卷書千載終不為小人也夫明六經之指涉百家之書縱不能增益德行敦厲風俗猶為一藝得以自資父兄不可常依鄉國不可常保一旦流離無人庇廕當自求諸身耳諺曰積財千萬不如薄伎在身伎之易習而可貴者無過讀書也世人不問愚智皆欲識人之多見事之廣而不肯讀書是猶求飽而懶營饌欲暖而惰裁衣也夫讀書之人自羲農已來宇宙之下凡識幾人凡見幾事生民之成敗好惡固不足論天地所不能藏鬼神所不能隱也有客難主人曰吾見強弩長戟誅罪安民以取公侯者有矣文義習吏匡時富國以取卿相者有矣學備古今才兼文武身無祿位妻子飢寒者不可勝數安足貴學乎主人對曰夫命之窮達猶金玉木石也脩以學藝猶磨瑩雕刻也金玉之磨瑩自美其鑛璞木石之段塊自醜其雕刻安可言木石之雕刻乃勝金玉之鑛璞哉不得以有學之貧賤比於無學之富貴也且負甲為兵咋筆為吏身死名滅者如牛毛角立傑出者如芝草握素披黃吟道詠德苦辛無益者如日蝕逸樂名利者如秋荼豈得同年而語矣且又聞之生而知之者上學而知之者次所以學者欲其多知明達耳必有天才拔群出類為將則闇與孫武吳起同術執政則懸得管仲子產之教雖未讀書吾亦謂之學矣今子即不能然不師古之蹤跡猶蒙被而臥耳人見鄰里親戚有佳快者使子弟慕而學之不知使學古人何其蔽也哉世人但知跨馬被甲長矟強弓便云我能為將不知明乎天道辨乎地利比量逆順鑒達興亡之妙也但知承上接下積財聚穀便云我能為相不知敬鬼事神移風易俗調節陰陽薦舉賢聖之至也但知私財不入公事夙辦便云我能治民不知誠己形物執轡如組反風滅火化鴟為鳳之術也但知抱令守律早刑晚舍便云我能平獄不知同轅觀罪分劍追財假言而姦露不問而情得之察也爰及農商工賈廝役奴隸釣魚屠肉飯牛牧羊皆有先達可為師表博學求之無不利於事也夫所以讀書學問本欲開心明目利於行耳未知養親者欲其觀古人之先意承顏怡聲下氣不憚劬勞以致甘腝惕然慚懼起而行之也未知事君者欲其觀古人之守職無侵見危授命不忘誠諫以利社稷惻然自念思欲效之也素驕奢者欲其觀古人之恭儉節用卑以自牧禮為教本敬者身基瞿然自失斂容抑志也素鄙恡者欲其觀古人之貴義輕財少私寡慾忌盈惡滿賙窮卹匱赧然悔恥積而能散也素暴悍者欲其觀古人之小心黜己齒弊舌存含垢藏疾尊賢容眾苶然沮喪若不勝衣也素怯懦者欲其觀古人之達生委命強毅正直立言必信求福不回勃然奮厲不可恐懾也歷茲以往百行皆然縱不能淳去泰去甚學之所知施無不達世人讀書者但能言之不能行之忠孝無聞仁義不足加以斷一條訟不必得其理宰千戶縣不必理其民問其造屋不必知楣橫而梲豎也問其為田不必知稷早而黍遲也吟嘯談謔諷詠辭賦事既優閑材增迂誕軍國經綸略無施用故為武人俗吏所共嗤詆良由是乎夫學者所以求益爾見人讀數十卷書便自高大凌忽長者輕慢同列人疾之如讎敵惡之如鴟梟如此以學自損不如無學也古之學者為己以補不足也今之學者為人但能說之也古之學者為人行道以利世也今之學者為己脩身以求進也夫學者猶種樹也春玩其華秋登其實講論文章春華也脩身利行秋實也人生小幼精神專利長成已後思慮散逸固須早教勿失機也吾七歲時誦魯靈光殿賦至於今日十年一理猶不遺忘二十之外所誦經書一月廢置便至荒蕪矣然人有坎壈失於盛年猶當晚學不可自棄孔子云五十以學易可以無大過矣魏武袁遺老而彌篤此皆少學而至老不倦也曾子七十乃學名聞天下荀卿五十始來遊學猶為碩儒公孫弘四十餘方讀春秋以此遂登丞相朱雲亦四十始學易論語皇甫謐二十始受孝經論語皆終成大儒此並早迷而晚寤也世人婚冠未學便稱遲暮因循面牆亦為愚爾幼而學者如日出之光老而學者如秉燭夜行猶賢乎暝目而無見者也學之興廢隨世輕重漢時賢俊皆以一經弘聖人之道上明天時下該人事用此致卿相者多矣末俗已來不復爾空守章句但誦師言施之世務殆無一可故士大夫子弟皆以博涉為貴不肯專儒梁朝皇孫已下總丱之年必先入學觀其志尚出身已後便從文吏略無卒業者冠冕為此者則有何胤劉瓛明山賓周捨朱异周弘正賀琛賀革蕭子政劉縚等兼通文史不徒講說也洛陽亦聞崔浩張偉劉芳鄴下又見刑子才此四儒者雖好經術亦以才博擅名如此諸賢故為上品以外率多田里閒人音辭鄙陋風操蚩拙相與專固無所堪能問一言輒酬數百責其指歸或無要會鄴下諺云博士買驢書券三紙未有驢字使汝以此為師令人氣塞孔子曰學也祿在其中矣今勤無益之事恐非業也夫聖人之書所以設教但明練經文粗通注義常使言行有得亦足為人何必仲尼居即須兩紙疏義燕寢講堂亦復何在以此得勝寧有益乎光陰可惜譬諸逝水當博覽機要以濟功業必能兼美吾無間焉俗間儒士不涉群書經緯之外義疏而已吾初入鄴與博陵崔文彥交遊嘗說王粲集中難鄭玄尚書事崔轉為諸儒道之始將發口懸見排蹙云文集止有詩賦銘誄豈當論經書事乎且先儒之中未聞有王粲也崔笑而退竟不以粲集示之魏收之在議曹與諸博士議宗廟事引據漢書博士笑曰未聞漢書得證經術魏便忿怒都不復言取韋玄成傳擲之而起博士一夜共披尋之達明乃來謝曰不謂玄成如此學也夫老莊之書蓋全真養性不肯以物累己也故藏名柱史終蹈流沙匿跡漆園卒辭楚相此任縱之徒耳何晏王弼祖述玄宗遞相誇尚景附草靡皆以農黃之化在乎己身周孔之業棄之度外而平叔以黨曹爽見誅觸死權之網也輔嗣以多笑人被疾陷好勝之穽也山巨源以蓄積取譏背多藏厚亡之文也夏侯玄以才望被戮無支離擁腫之鑒也荀奉倩喪妻神傷而卒非鼓缶之情也王夷甫悼子悲不自勝異東門之達也嵇叔夜排俗取禍豈和光同塵之流也郭子玄以傾動專勢寧後身外己之風也阮嗣宗沈酒荒迷乖畏途相誡之譬也謝幼輿贓賄黜削違棄其餘魚之旨也彼諸人者並其領袖玄宗所歸其餘桎梏塵滓之中顛仆名利之下者豈可備言乎直取其清談雅論剖玄析微賓主往復娛心悅耳非濟世成俗之要也洎于梁世茲風復闡莊老周易總謂三玄武皇簡文躬自講論周弘正奉贊大猷化行都邑學徒千餘實為盛美元帝在江荊間復所愛習召置學生親為教授廢寢忘食以夜繼朝至乃倦劇愁憤輒以講自釋吾時頗預末筵親承音指性既頑魯亦所不好云齊孝昭帝侍婁太后疾容色顦顇服膳減損徐之才為灸兩穴帝握拳代痛爪入掌心血流滿手后既痊愈帝尋疾崩遺詔恨不見太后山陵之事其天性至孝如彼不識忌諱如此良由無學所為若見古人之譏欲母早死而悲哭之則不發此言也孝為百行之首猶須學以脩飾之況餘事乎梁元帝嘗為吾說昔在會稽年始十二便已好學時又患疥手不得拳膝不得屈閉齋張葛幃避蠅獨坐銀甌貯山陰甜酒時復進之以自寬痛率意自讀史書一日二十卷既未師受或不識一字或不解一語要自重之不知厭倦帝子之尊童稚之逸尚能如此況其庶士冀以自達者哉古人勤學有握錐投斧照雪聚螢鋤則帶經牧則編簡亦為勤篤梁世彭城劉綺交州刺史勃之孫早孤家貧燈燭難辦常買荻尺寸折之燃明夜讀孝元初出會稽精選寮寀綺以才華為國常侍兼記室殊蒙禮遇終於金紫光祿義陽朱詹世居江陵後出揚都好學家貧無資累日不爨乃時吞紙以實腹寒無氈被抱犬而臥犬亦飢虛起行盜食呼之不至哀聲動鄰猶不廢業卒成學士官至鎮南錄事參軍為孝元所禮此乃不可為之事亦是勤學之一人東莞臧逢世年二十餘欲讀班固漢書苦假借不久乃就姊夫劉緩乞丐客刺書翰紙末手寫一本軍府服其志尚卒以漢書聞齊有宦者內參田鵬鸞本蠻人也年十四五初為閽寺便知好學懷袖握書曉夕諷誦所居卑末使役苦辛時伺閒隙周章詢請每至文林館氣喘汗流問書之外不暇他語及覩古人節義之事未嘗不感激沈吟久之吾甚憐愛倍加開獎後被賞遇賜名敬宣位至侍中開府後主之奔青州遣其西出參伺動靜為周軍所獲問齊王何在紿云已去計當出境疑其不信歐捶服之每折一支辭色愈厲竟斷四體而卒蠻夷童丱猶能以學成忠齊之將相比敬宣之奴不若也鄴平之後見徙入關思魯嘗謂吾曰朝無祿位家無積財當肆筋力以申供養每被課篤勤勞經史未知為子可得安乎吾命之曰子當以養為心父當以學為教使汝棄學徇財豐吾衣食食之安得甘衣之安得暖若務先王之道紹家世之業藜羹縕褐我自欲之書曰好問則裕禮云獨學而無友則孤陋而寡聞蓋須切磋相起明也見有閉門讀書師心自是稠人廣坐謬誤差失者多矣穀梁傳稱公子友與莒挐相搏左右呼曰孟勞孟勞者魯之寶刀名亦見廣雅近在齊時有姜仲岳謂孟勞者公子左右姓孟名勞多力之人為國所寶與吾苦諍時清河郡守邢峙當世碩儒助吾證之赧然而伏又三輔決錄云靈帝殿柱題曰堂堂乎張京兆田郎蓋引論語偶以四言目京兆人田鳳也有一才士乃言時張京兆及田郎二人皆堂堂耳聞吾此說初大驚駭其後尋愧悔焉江南有一權貴讀誤本蜀都賦注解蹲鴟芋也乃為羊字人饋羊肉答書云損惠蹲鴟舉朝驚駭不解事義久後尋迹方知如此元氏之世在洛京時有一才學重臣新得史記音而頗紕繆誤反顓頊字頊當為許錄反錯作許緣反遂一一謂言從來謬音專旭當音專翾耳此人先有高名翕然信行期年之後更有碩儒苦相究討方知誤焉漢書王莽贊云紫色䵷聲餘分閏位謂以偽亂真爾昔吾嘗共人談書言及王莽形狀有一俊士自許史學名價甚高乃云王莽非直鴟目虎吻亦紫色蛙聲又禮樂志云給太官挏馬酒李奇注以馬乳為酒也揰挏乃成二字竝從手揰挏此謂撞擣挺挏之今為酪酒亦然向學士又以為種桐時太官釀馬酒乃熟其孤陋遂至於此太山羊肅亦稱學問讀潘岳賦周文弱枝之棗為杖策之杖世本容成造曆以曆為碓磨之磨談說製文援引古昔必須眼學勿信耳受江南閭里間士大夫或不學問羞為鄙朴道聽塗說強事飾辭呼徵質為周鄭謂霍亂為博陸上荊州必稱陝西下揚都言去海郡言食則餬口道錢則孔方問移則楚丘論婚則宴爾及王則無不仲宣語劉則無不公幹凡有一二百件傳相祖述尋問莫知源由施安時復失所莊生有乘時鵲起之說故謝朓詩曰鵲起登吳臺吾有一親表作七夕詩云今夜吳臺鵲亦共往填河羅浮山記云望平地樹如薺故戴暠詩云長安樹如薺又鄴下有一人詠樹詩云遙望長安薺又嘗見謂矜誕為夸毗呼高年為富有春秋皆耳學之過也夫文字者墳籍根本世之學徒多不曉字讀五經者是徐邈而非許慎習賦誦者信褚詮而忽呂忱明史記者專徐鄒而廢篆籀學漢書者悅應蘇而略蒼雅不知書音是其枝葉小學乃其宗系至見服虔張揖音義則貴之得通俗廣雅而不屑一手之中向背如此況異代各人乎夫學者貴能博聞也郡國山川官位姓族衣服飲食器皿制度皆欲根尋得其原本至於文字忽不經懷己身姓名多或乖舛縱得不誤亦未知所由近世有人為子制名兄弟皆山傍立字而有名峙者兄弟皆手傍立字而有名𢴰者兄弟皆水傍立字而有名𤁒者名儒碩學此例甚多若有知音鍾之不調一何可笑吾嘗從齊主幸并州自井陘關入上艾縣東數十里有獵閭村後百官受馬糧在晉陽東百餘里亢仇城側並不識二所本是何地博求古今皆未能曉及檢字林韻集乃知獵閭是舊䜲餘聚亢仇舊是䜱𧮭亭悉屬上艾時太原王劭欲撰鄉邑記注因此二名聞之大喜吾初讀莊子螝二首韓非子曰蟲有螝者一身兩口爭食相齕遂相殺也茫然不識此字何音逢人輒問了無解者案爾雅諸書蠶蛹名螝又非二首兩口貪害之物後見古今字詁此亦古之虺字積年凝滯豁然霧解嘗遊趙州見柏人城北有一小水土人亦不知名後讀城西門徐整碑云洦流東指眾皆不識吾案說文此字古魄字也洦淺水貌此水漢來本無名矣直以淺貌目之或當即以洦為名乎世中書翰多稱勿勿相承如此不知所由或有妄言此忽忽之殘缺耳案說文勿者州里所建之旗也象其柄及三斿之形所以趣民事故怱遽者稱為勿勿吾在益州與數人同坐初晴日明見地上小光問左右此是何物有一蜀豎就視答云是豆逼耳相顧愕然不知所謂命取將來乃小豆也窮訪蜀土呼粒為逼時莫之解吾云三蒼說文此字白下為匕皆訓粒通俗文音方力反眾皆歡悟愍楚友壻竇如同從河州來得一青鳥馴養愛翫舉俗呼之為鶡吾曰鶡出上黨數曾見之色並黃黑無駁雜也故陳思王鶡賦云揚玄黃之勁羽試檢說文䲸雀似鶡而青出羌中韻集音介此疑頓釋梁世有蔡朗者諱純既不涉學遂呼蓴為露葵面牆之徒遞相倣效承聖中遣一士大夫聘齊齊主客郎李恕問梁使曰江南有露葵否答曰露葵是蓴水鄉所出卿今食者綠葵菜耳李亦學問但不測彼之深淺乍聞無以覈究思魯等姨夫彭城劉靈嘗與吾坐諸子侍焉吾問儒行敏行曰凡字與諮議名同音者其數多少能盡識乎答曰未之究也請導示之吾曰凡如此例不預研檢忽見不識誤以問人反為無賴所欺不容易也因為說之得五十許字諸劉歎曰不意乃爾若遂不知亦為異事校定書籍亦何容易自揚雄劉向方稱此職耳觀天下書未徧不得妄下雌黃或彼以為非此以為是或本同末異或兩文皆欠不可偏信一隅也
