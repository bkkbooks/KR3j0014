body:
  text: 慕賢篇七古人云千載一聖猶旦暮也五百年一賢猶比膊也言聖賢之難得疏闊如此儻遭不世明達君子安可不攀附景仰之乎吾生於亂世長於戎馬流離播越聞見已多所值名賢未嘗不心醉魂迷向慕之也人在少年神情未定所與款狎熏漬陶染言笑舉動無心於學潛移暗化自然似之何況操履藝能較明易習者也是以與善人居如入芝蘭之室久而自芳也與惡人居如入鮑魚之肆久而自臭也墨翟悲於染絲是之謂矣君子必慎交遊焉孔子曰無友不如己者顏閔之徒何可世得但優於我便足貴之世人多蔽貴耳賤目重遙輕近少長周旋如有賢哲每相狎侮不加禮敬他鄉異縣微藉風聲延頸企踵甚於飢渴校其長短核其精粗或彼不能如此矣所以魯人謂孔子為東家丘昔虞國宮之奇少長於君君狎之不納其諫以至亡國不可不留心也用其言棄其身古人所恥凡有一言一行取於人者皆顯稱之不可竊人之美以為己力雖輕雖賤者必歸功焉竊人之財刑辟之所處竊人之美鬼神之所責梁孝元前在荊州有丁覘者洪亭民耳頗善屬文殊工草隸孝元書記一皆使之軍府輕賤多未之重恥令子弟以為楷法時云丁君十紙不敵王褒數字吾雅愛其手迹常所寶持孝元嘗遣典籤惠編送文章示蕭祭酒祭酒問云君王比賜書翰及寫詩筆殊為佳手姓名為誰那得都無聲問編以實答子雲歎曰此人後生無比遂不為世所稱亦是奇事於是聞者少復刮目稍仕至尚書儀曹郎末為晉安王侍讀隨王東下及西臺陷歿簡牘湮散丁亦尋卒於揚州前所輕者後思一紙不可得矣侯景初入建業臺門雖閉公私草擾各不自全太子左衛率羊侃坐東掖門部分經略一宿皆辦遂得百餘日抗拒凶逆于時城內四萬許人王公朝士不下一百便是恃侃一人安之其相去如此古人云巢父許由讓於天下市道小人爭一錢之利亦已懸矣齊文宣帝即位數年便沈湎縱恣略無綱紀尚能委政尚書令楊遵彥內外清謐朝野晏如各得其所物無異議終天保之朝遵彥後為孝昭所戮刑政於是衰矣斛律明月齊朝折衝之臣無罪被誅將士解體周人始有吞齊之志關中至今譽之此人用兵豈止萬夫之望而已也國之存亡係其生死張延雋之為晉州行臺左丞匡維主將鎮撫疆埸儲積器用愛活黎民隱若敵國矣群小不得行志同力遷之既代之後公私擾亂周師一舉此鎮先平齊亡之迹啓於是矣
