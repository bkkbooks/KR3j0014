body:
  text: 歸心篇十六三世之事信而有徵家業歸心勿輕慢也其間妙旨具諸經論不復於此少能讚述但懼汝曹猶未牢固略重勸誘爾原夫四塵五廕剖析形有六舟三駕運載群生萬行歸空千門入善辨才智惠豈徒七經百氏之博哉明非堯舜周孔所及也內外兩教本為一體漸極為異深淺不同內典初門設五種禁外典仁義禮智信皆與之符仁者不殺之禁也義者不盜之禁也禮者不邪之禁也智者不酒之禁也信者不妄之禁也至如畋狩軍旅燕享刑罰因民之性不可卒除就為之節使不淫濫爾歸周孔而背釋宗何其迷也俗之謗者大抵有五其一以世界外事及神化無方為迂誕也其二以吉凶禍福或未報應為欺誑也其三以僧尼行業多不精純為姦慝也其四以糜費金寶減耗課役為損國也其五以縱有因緣如報善惡安能辛苦今日之甲利益後世之乙乎為異人也今並釋之于下云釋一曰夫遙大之物寧可度量今人所知莫若天地天為積氣地為積塊日為陽精月為陰精星為萬物之精儒家所安也星有墜落乃為石矣精若是石不得有光性又質重何所繫屬一星之徑大者百里一宿首尾相去數萬百里之物數萬相連闊狹從斜常不盈縮又星與日月形色同爾但以大小為其等差然而日月又當石也石既牢密烏兔焉容石在氣中豈能獨運日月星辰若皆是氣氣體輕浮當與天合往來環轉不得錯違其間遲疾理宜一等何故日月五星二十八宿各有度數移動不均寧當氣墜忽變為石地既滓濁法應沈厚鑿土得泉乃浮水上積水之下復有何物江河百谷從何處生東流到海何為不溢歸塘尾閭泄何所到沃焦之石何氣所然潮汐去還誰所節度天漢懸指那不散落水性就下何故上騰天地初開便有星宿九州未劃列國未分翦疆區野若為躔次封建已來誰所制割國有增減星無進退災祥禍福就中不差乾象之大列星之夥何為分野止繫中國昴為旄頭胸奴之次西胡東越雕題交址獨棄之乎以此而求迄無了者豈得以人事尋常抑必宇宙外也凡人之信唯耳與目耳目之外咸致疑焉儒家説天自有數義或渾或蓋乍宣乍安斗極所周管維所屬若所親見不容不同若所測量寧足依據何故信凡人之臆説迷大聖之妙旨而欲必無恆沙世界微塵數劫也而鄒衍亦有九州之談山中人不信有魚大如木海上人不信有木大如魚漢武不信弦膠魏文不信火布胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有二萬斛船皆實驗也世有祝師及諸幻術猶能履火蹈刃種瓜移井倏忽之間十變五化人力所為尚能如此何況神通感應不可思量千里寶幢百由旬座化成淨土踊出妙塔乎釋二曰夫信謗之徵有如影響耳聞眼見其事已多或乃精誠不深業緣未感時儻差闌終當獲報耳善惡之行禍福所歸九流百氏皆同此論豈獨釋典為虛妄乎項橐顏回之短折原憲伯夷之凍餒盜跖莊蹻之福壽齊景桓魋之富強若引之先業冀以後生更為通耳如以行善而偶鍾禍報為惡而儻值福徵便可怨尤即為欺詭則亦堯舜之云虛周孔之不實也又欲安所依信而立身乎釋三曰開闢已來不善人多而善人少何由悉責其精潔乎見有名僧高行棄而不説若覩凡僧流俗便生非毀且學者之不勤豈教者之為過俗僧之學經律何異士人之學詩禮以詩禮之教格朝廷之人略無全行者以經律之禁格出家之輩而獨責無犯哉且闕行之臣猶求祿位毀禁之侶何慚供養乎其於戒行自當有犯一披法服已墮僧數歲中所計齋講誦持比諸白衣猶不啻山海也釋四曰內教多途出家自是其一法耳若能誠孝在心仁惠為本須達流水不必剃落鬚髮豈令罄井田而起塔廟窮編戶以為僧尼也皆由為政不能節之遂使非法之寺妨民稼穡無業之僧空國賦算非大覺之本旨也抑又論之求道者身計也惜費者國謀也身計國謀不可兩遂誠臣徇主而棄親孝子安家而忘國各有行也儒有不屈王侯高尚其事隱有讓王辭相避世山林安可計其賦役以為罪人若能偕化黔首悉入道場如妙樂之世儴佉之國則有自然稻米無盡寶藏安求田蠶之利乎釋五曰形體雖死精神猶存人生在世望於後身似不相屬及其歿後則與前身似猶老少朝夕耳世有魂神示現夢想或降童妾或感妻孥求索飲食徵須福祐亦為不少矣今人貧賤疾苦莫不怨尤前世不修功業以此而論安可不為之作地乎夫有子孫自是天地間一蒼生耳何預身事而乃愛護遺其基址況於己之神爽頓欲棄之哉凡夫蒙蔽不見未來故言彼生與今非一體耳若有天眼鑒其念念隨滅生生不斷豈可不怖畏耶又君子處世貴能克己復禮濟時益物治家者欲一家之慶治國者欲一國之良僕妾臣民與身竟何親也而為勤苦修德乎亦是堯舜周孔虛失愈樂耳一人修道濟度幾許蒼生免脫幾身罪纍幸熟思之汝曹若顧俗計樹立門戶不棄妻子未能出家但當兼修戒行留心誦讀以為來世津梁人身難得勿虛過也儒家君子尚離庖廚見其生不忍其死聞其聲不食其肉高柴折像未知內教皆能不殺此乃仁者自然用心含生之徒莫不愛命去殺之事必勉行之好殺之人臨死報驗子孫殃禍其數甚多不能悉録耳且示數條於末梁世有人常以雞卵白和沐云使髮光每沐輒破二三十枚臨死髮中但聞啾啾數千雞雛聲江陵劉氏以賣鱓羹為業後生一兒頭具是鱓自頸已下方為人耳王克為永嘉郡有人餉羊集賓欲宴而羊繩解來投一客先跪兩拜便入衣中此客竟不言之固無救請須臾宰羊為炙先行至客一臠入口便下皮內周行遍體痛楚號叫方復説之遂作羊鳴而死梁孝元在江州時有人為望蔡縣令經劉敬躬亂縣廨被焚寄寺而住民將牛酒作禮縣令以牛繫剎柱屏除形像鋪設床坐於堂上接賓未殺之頃牛解徑來至階而拜縣令大笑命左右宰之飲噉醉飽便臥簷下稍醒而覺體癢爬搔隱疹因爾成癩十許年死楊思達為西陽郡值侯景亂時復旱儉飢民盜田中麥思達遣一部曲守視所得盜者輒截手腕凡戮十餘人部曲後生一男自然無手齊有一奉朝請家甚豪侈非手殺牛噉之不美年三十許病篤大見牛來舉體如被刀刺叫呼而終江陵高偉隨吾入齊凡數年向幽州淀中捕魚後病每見群魚齧之而死
