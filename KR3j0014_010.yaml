body:
  text: 名實篇十名之與實猶形之與影也德藝周厚則名必善焉容色姝麗則影必美焉今不修身而求令名於世者猶貌甚惡而責妍影於鏡也上士忘名中士立名下士竊名忘名者體道合德享鬼神之福祐非所以求名也立名者修身慎行懼榮觀之不顯非所以讓名也竊名者厚貌深姦干浮華之虛稱非所以得名也人足所履不過數寸然而咫尺之途必顛蹶於崖岸拱把之梁每沈溺於川谷者何哉為其傍無餘地故也君子之立己抑亦如之至誠之言人未能信至潔之行物或致疑皆由言行聲名無餘地也吾每為人所毀常以此自責若能開方軌之路廣造舟之航則仲由之言信重於登壇之盟趙喜之降城賢於折衝之將矣吾見世人清名登而金貝入信譽顯而然諾虧不知後之矛戟毀前之干櫓也宓子賤云誠於此者形於彼人之虛實真偽在乎心無不見乎迹但察之未熟耳一為察之所鑒巧偽不如拙誠承之以羞大矣伯石讓卿王莽辭政當于爾時自以巧密後人書之留傳萬代可為骨寒毛豎也近有大貴孝悌著聲前後居喪哀毀踰制亦足以高於人矣而嘗於苫塊之中以巴豆塗臉遂使成瘡表哭泣之過左右童豎不能掩之益使外人謂其居處飲食皆為不信以一偽喪百誠者乃貪名不已故也有一士族讀書不過二三百卷天才鈍拙而家世殷厚雅自矜持多以酒犢珍玩交諸名士甘其餌者遞相吹噓朝廷以為文華亦嘗出境聘東萊王韓晉明篤好文學疑彼製作多非機杼遂設宴言面相討試竟日歡諧辭人滿席屬音賦韻命筆為詩彼造次即成了非向韻衆客各自沈吟遂無覺者韓退歎曰果如所量韓又嘗問曰玉珽杼上終葵首當作何形乃答云珽頭曲圜勢如葵葉耳韓既有學忍笑為吾説之治點子弟文章以為聲價大弊事也一則不可常繼終露其情二則學者有憑益不精勵鄴下有一少年出為襄國令頗自勉篤公事經懷每加撫恤以求聲譽凡遣兵役握手送離或齎梨棗餅餌人人贈別云上命相煩情所不忍道路飢渴以此見思民庶稱之不容於口及遷為泗州別駕此費日廣不可常周一有偽情觸塗難繼功績遂損敗矣或問曰夫神滅形消遺聲餘價亦猶蟬殼蛇皮獸迒鳥迹耳何預於死者而聖人以為名教乎對曰勸也勸其立名則獲其實且勸一伯夷而千萬人立清風矣勸一季札而千萬人立仁風矣勸一柳下惠而千萬人立貞風矣勸一史魚而千萬人立直風矣故聖人欲其魚鱗鳳翼雜沓參差不絶於世豈不弘哉四海悠悠皆慕名者蓋因其情而致其善耳抑又論之祖考之嘉名美譽亦子孫之冕服牆宇也自古及今獲其庇廕者衆矣夫修善立名者亦猶築室樹果生則獲其利死則遺其澤世之汲汲者不達此意若其與魂爽俱升松柏偕茂者惑矣哉
