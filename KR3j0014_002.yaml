body:
  text: 教子篇二上智不教而成下愚雖教無益中庸之人不教不知也古者聖王有胎教之法懷子三月出居別宮目不邪視耳不妄聽音聲滋味以禮節之書之玉版藏諸金櫃子生咳㖷師保固明仁孝禮義導習之矣凡庶縱不能爾當及嬰稚識人顏色知人喜怒便加教誨使為則為使止則止比及數歲可省笞罰父母威嚴而有慈則子女畏慎而生孝矣吾見世間無教而有愛每不能然飲食運為恣其所欲宜誡翻獎應訶反笑至有識知謂法當耳驕慢已習方復制之捶撻至死而無威忿怒日隆而增怨逮于成長終為敗德孔子云少成若天性習慣如自然是也俗諺曰教婦初來教兒嬰孩誠哉斯語凡人不能教子女者亦非欲陷其罪惡但重於訶怒傷其顏色不忍楚撻慘其肌膚耳當以疾病為諭安得不用湯藥針艾救之哉又宜思勤督訓者可願苛虐於骨肉乎誠不得已也王大司馬母魏夫人性甚嚴正王在湓城時為三千人將年踰四十少不如意猶捶撻之故能成其勳業梁元帝時有一學士聰敏有才為父所寵失於教義一言之是徧於行路終年譽之一行之非揜藏文飾冀其自改年登婚宦暴慢日滋竟以言語不擇為周逖抽腸釁鼓云父子之嚴不可以狎骨肉之愛不可以簡簡則慈孝不接狎則怠慢生焉由命士以上父子異宮此不狎之道也抑搔癢痛懸衾篋枕此不簡之教也或問曰陳亢喜聞君子之遠其子何謂也對曰有是也蓋君子之不親教其子也詩有諷刺之詞禮有嫌疑之誡書有悖亂之事春秋有衺僻之譏易有備物之象皆非父子之可通言故不親授耳齊武成帝子瑯琊王太子母弟也生而聰慧帝及后並篤愛之衣服飲食與東宮相準帝每面稱之曰此黠兒也當有所成及太子即位王居別宮禮數優僭不與諸王等太后猶謂不足常以為言年十許歲驕恣無節器服玩好必擬乘輿嘗朝南殿見典御進新冰鉤盾獻早李還索不得遂大怒訽曰至尊已有我何意無不知分齊率皆如此識者多有叔段州吁之譏後嫌宰相遂矯詔斬之又懼有救乃勒麾下軍士防守殿門既無反心受勞而罷後竟坐此幽薨人之愛子亦罕能均自古及今此弊多矣賢俊者自可賞愛頑魯者亦當矜憐有偏寵者雖欲以厚之更所以禍之共叔之死母實為之趙王之戮父實使之劉表之傾宗覆族袁紹之地裂兵亡可為靈龜明鑒也齊朝有一士大夫嘗謂吾曰我有一兒年已十七頗曉書疏教其鮮卑語及彈琵琶稍欲通解以此伏事公卿無不寵愛亦要事也吾時俛而不答異哉此人之教子也若由此業自致卿相亦不願汝曹為之
