body:
  text: 誡兵篇十四顏氏之先本乎鄒魯或分入齊世以儒雅為業遍在書記仲尼門徒升堂者七十有二顏氏居八人焉秦漢魏晉下逮齊梁未有用兵以取達者春秋之世顏高顏鳴顏羽之徒皆一鬭夫爾齊有顏涿聚趙有顏最漢末有顏良宋有顏延之並處將軍之任竟以顛覆漢郎顏駟自稱好武更無事迹顏忠以黨楚王受誅顏俊以據武威見殺得姓已來無清操者唯此二人皆罹禍敗頃世亂離衣冠之士雖無身手或聚徒衆違棄素業徼幸戰功吾既羸薄仰惟前代故置心於此子孫志之孔子力翹門關不以力聞此聖證也吾見今世士大夫才有氣幹便倚賴之不能被甲執兵以衛社稷但微行險服逞弄拳腕大則陷危亡小則貽恥辱遂無免者國之興亡兵之勝敗博學所至幸討論之入帷幄之中參廟堂之上不能為主畫規以謀社稷君子所恥也然而每見文士頗讀兵書微有經略若居承平之世睥睨宮閫幸災樂禍首為逆亂詿誤善良如在兵革之時構扇反覆縱橫説誘不識存亡強相扶戴此皆陷身滅族之本也誡之哉誡之哉習五兵便乘騎正可稱武夫爾今世士大夫但不讀書即稱武夫兒乃飯囊酒甕也
