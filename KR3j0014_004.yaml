body:
  text: 後娶篇四吉甫賢父也伯奇孝子也以賢父御孝子合得終於天性而後妻間之伯奇遂放曾參婦死謂其子曰吾不及吉甫汝不及伯奇王駿喪妻亦謂人曰我不及曾參子不如華元並終身不娶此等足以為誡其後假繼慘虐孤遺離間骨肉傷心斷腸者何可勝數慎之哉慎之哉江左不諱庶孽喪室之後多以妾媵終家事疥癬蚊虻或未能免限以大分故稀鬭鬩之恥河北鄙於側出不預人流是以必須重娶至於三四母年有少於子者後母之弟與前婦之兄衣服飲食爰及婚宦至於士庶貴賤之隔俗以為常身沒之後辭訟盈公門謗辱彰道路子誣母為妾弟黜兄為傭播揚先人之辭迹暴露祖考之長短以求直己者往往而有悲夫自古姦臣佞妾以一言陷人者衆矣況夫婦之義曉夕移之婢僕求容助相說引積年纍月安有孝子乎此不可不畏凡庸之性後夫多寵前夫之孤後妻必虐前妻之子非唯婦人懷嫉妒之情丈夫有沉惑之僻亦事勢使之然也前夫之孤不敢與我子爭家提攜鞠養積習生愛故寵之前妻之子每居己生之上宦學婚嫁莫不為防焉故虐之異姓寵則父母被怨繼親虐則兄弟為讎家有此者皆門戶之禍也思魯等從舅殷外臣博達之士也有子基諶皆已成立而再娶王氏基每拜見後母感慕嗚咽不能自持家人莫忍仰視王亦悽愴不知所容旬月求退便以禮遣此亦悔事也後漢書曰安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被毆杖不得已廬於舍外旦入而灑掃父怒又逐之乃廬於里門昏晨不廢積歲餘父母慚而還之後行六年服喪過乎哀既而弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取其朽敗者曰我素所服食身口所安也弟子數破其産還復賑給建光中公車特徵至拜侍中包性恬虛稱疾不起以死自乞有詔賜告歸也
