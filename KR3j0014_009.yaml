body:
  text: 文章篇九夫文章者原出五經詔命策檄生於書者也序述論議生於易者也歌詠賦頌生於詩者也祭祀哀誄生於禮者也書奏針銘生於春秋者也朝廷憲章軍旅誓誥敷顯仁義發明功德牧民建國施用多途至於陶冶性靈從容諷諫入其滋味亦樂事也行有餘力則可習之然而自古文人多陷輕薄屈原露才揚己顯暴君過宋玉體貌容冶見遇俳優東方曼倩滑稽不雅司馬長卿竊資無操王褒過章童約揚雄德敗美新李陵降辱夷虜劉歆反覆莽世傅毅黨附權門班固盜竊父史趙元叔抗竦過度馮敬通浮華擯壓馬季長佞媚獲誚蔡伯喈同惡受誅吳質詆訶鄉里曹植悖慢犯法杜篤乞假無厭路粹隘狹已甚陳琳實號粗踈繁欽性無檢格劉楨屈強輸作王粲率躁見嫌孔融禰衡誕傲致殞楊修丁廙扇動取斃阮籍無禮敗俗嵇康凌物凶終傅玄忿鬭免官孫楚矜誇凌上陸機犯順履險潘嶽乾沒取危顏延年負氣摧黜謝靈運空踈亂紀王元長凶賊自詒謝玄暉侮慢見及凡此諸人皆其翹秀者不能悉紀大較如此至于帝王亦或未免自昔天子而有才華者唯漢武魏太祖文帝明帝宋孝武帝皆負世議非懿德之君也自子遊子夏荀況孟軻枚乘賈誼蘇武張衡左思之儔有盛名而免過患者時復聞之但其損敗居多耳每嘗思之原其所積文章之體標舉興會發引性靈使人矜伐故忽於持操果於進取今世文士此患彌切一事愜當一句清巧神厲九霄志凌千載自吟自賞不覺更有傍人加以砂礫所傷慘於矛戟諷刺之禍速乎風塵深宜防慮以保元吉學問有利鈍文章有巧拙鈍學纍功不妨精熟拙文研思終歸蚩鄙但成學士自足為人必乏天才勿強操筆吾見世人至無才思自謂清華流布醜拙亦以衆矣江南號為詅癡符近在并州有一士族好為可笑詩賦誂撇邢魏諸公衆共嘲弄虛相讚説便擊牛釃酒招延聲譽其妻明鑒婦人也泣而諫之此人歎曰才華不為妻子所容何況行路至死不覺自見之謂明此誠難也學為文章先謀親友得其評論者然後出手慎勿師心自任取笑旁人也自古執筆為文者何可勝言然至於宏麗精華不過數十篇耳但使不失體裁辭意可觀便稱才士要須動俗蓋世亦俟河之清乎不屈二姓夷齊之節也何事非君伊箕之義也自春秋已來家有奔亡國有吞滅君臣固無常分矣然而君子之交絶無惡聲一旦屈膝而事人豈以存亡而改慮陳孔璋居袁裁書則呼操為豺狼在魏製檄則目紹為蛇虺在時君所命不得自專然亦文人之巨患也當務從容消息之或問揚雄曰吾子少而好賦雄曰然童子雕蟲篆刻壯夫不為也余竊非之曰虞舜歌南風之詩周公作鴟梟之詠吉甫史克雅頌之美者未聞皆在幼年纍德也孔子曰不學詩無以言自衛返魯樂正雅頌各得其所大明孝道引詩證之揚雄安敢忽之也若論詩人之賦麗以則辭人之賦麗以淫但知變之而已又未知雄自為壯夫何如也著劇秦美新妄投於閣周章怖懾不達天命童子之為耳桓談以勝老子葛洪以方仲尼使人歎息此人直以曉算術解陰陽故著太玄經數子為所惑耳其遺言餘行孫卿屈原之不及安敢望大聖之清塵且太玄今竟何用乎不啻覆醬瓿而已齊世有席毗者清幹之士官至行臺尚書嗤鄙文學嘲劉逖云君輩辭藻譬若榮華須臾之玩非宏才也豈比吾徒千丈松樹常有風霜不可凋悴矣劉應之曰既有寒木又發春華何如也席笑曰可矣凡為文章猶人乘騏驥雖有逸氣當以銜勒制之勿使流亂軌躅放意填坑岸也文章當以理致為心腎氣調為筋骨事義為皮膚華麗為冠冕今世相承趨末棄本率多浮豔辭與理競辭勝而理伏事與才爭事繁而才損放逸者流宕而忘歸穿鑿者補綴而不足時俗如此安能獨違但務去泰去甚耳必有盛才重譽改革體裁者實吾所希古人之文宏材逸氣體度風格去今實遠但緝綴疏朴未為密緻耳今世音律諧靡章句偶對諱避精詳賢於往昔多矣宜以古之製裁為本今之辭調為末並須兩存不可偏棄也吾家世文章甚為典正不從流俗梁孝元在蕃邸時撰西府新文訖無一篇見録者亦以不偶於世無鄭衛之音故也有詩賦銘誄書表啓疏二十卷吾兄弟始在草土並未得編次便遭火蕩盡竟不傳於世銜酷茹恨徹於心髓操行見於梁史文士傳及孝元懷舊志沈隱侯曰文章當從三易易見事一也易識字二也易讀誦三也邢子才常曰沈侯文章用事不使人覺若胸臆語也深以此服之祖孝徵亦嘗謂吾曰沈詩云崖傾護石髓此豈似用事耶邢子才魏收俱有重名時俗準的以為師匠邢賞服沈約而輕任昉魏愛慕任昉而毀沈約每於談宴辭色以之鄴下紛紜各有朋黨祖孝徵嘗謂吾曰任沈之是非乃邢魏之優劣也吳均集有破鏡賦昔者邑號朝歌顏淵不舍里名勝母曾參斂襟蓋忌夫惡名之傷實也破鏡乃凶逆之獸事見漢書為文幸避此名也比世往往見有和人詩者題云敬同孝經云資於事父以事君而敬同不可輕言也梁世費昶詩云不知是耶非殷澐詩云颻揚雲母舟簡文曰昶既不識其父澐又颻揚其母此雖悉古事不可用也世人或有文章引詩伐鼓淵淵者宋書已有屢遊之誚如此流比幸須避之北面事親別舅摛渭陽之詠堂上養老送兄賦桓山之悲皆大失也舉此一隅觸塗宜慎江南文制欲人彈射知有病纍隨即改之陳王得之於丁廙也山東風俗不通擊難吾初入鄴遂嘗以此忤人至今為悔汝曹必無輕議也凡代人為文皆作彼語理宜然矣至於哀傷凶禍之辭不可輒代蔡雍為胡金盈作母靈表頌曰悲母氏之不永然委我而夙喪又為胡皓作其父銘曰葬我考議郎君袁三公頌曰猗歟我祖出自有媯王粲為潘文則思親詩云躬此勞瘁鞠豫小人庶我顯妣克保遐年而並載乎雍粲之集此例甚衆古人之所行今世以為諱陳思王武帝誄遂深永蟄之思潘嶽悼亡賦乃愴手澤之遺是方父於蟲匹婦於考也蔡雍楊秉碑云統大麓之重潘尼贈盧景宣詩云九五思龍飛孫楚王驃騎誄云奄忽登遐陸機父誄云億兆宅心敦敘百揆姊誄云俔天之和今為此言則朝廷之罪人也王粲贈楊德祖詩云我君餞之其樂泄泄不可妄施人子況儲君乎挽歌辭者或云古者虞殯之歌或云出自田橫之客皆為生者悼往告哀之意陸平原多為死人自歎之言詩格既無此例又乖製作本意凡詩人之作刺針美頌各有源流未嘗混雜善惡同篇也陸機為齊謳篇前敘山川物産風教之盛後章忽鄙山川之情殊失厥體其為吳趨行何不陳子光夫差乎京洛行何不述赧王靈帝乎自古宏才博學用事誤者有矣百家雜説或有不同書儻湮滅後人不見故未敢輕議之今指知決紕繆者略舉一兩端以為誡詩云有鷕雉鳴又曰雉鳴求其牡毛傳亦曰鷕雌雉聲又云雉之朝雊尚求其雌鄭玄注月令亦云雊雄雉鳴潘嶽賦曰雉鷕鷕以朝雊是則混雜其雄雌矣詩云孔懷兄弟孔甚也懷思也言甚可思也陸機與長沙顧母書述從祖弟士璜死乃言痛心拔腦有如孔懷心既痛矣即為甚思何故方言有如也觀其此意當謂親兄弟為孔懷詩云父母孔邇而呼二親為孔邇於義通乎異物志云擁劍狀如蟹但一螯偏大爾何遜詩云躍魚如擁劍是不分魚蟹也漢書御史府中列柏樹常有野鳥數千棲宿其上晨去暮來號朝夕鳥而文士往往誤作烏鳶用之抱朴子説項曼都詐稱得仙自云仙人以流霞一杯與我飲之輒不飢渴而簡文詩云霞流抱朴碗亦猶郭象以惠施之辨為莊周言也後漢書囚司徒崔烈以鋃鐺鎖鋃鐺大鎖也世間多誤作金銀字武列太子亦是數千卷學士嘗作詩云銀鎖三公腳刀撞僕射頭為俗所誤文章地理必須愜當梁簡文雁門太守行乃云鵝軍攻日逐燕騎蕩康居大宛歸善馬小月送降書蕭子暉隴頭水云天寒隴水急散漫俱分瀉北注徂黃龍東流會白馬此亦明珠之纇美玉之瑕宜慎之王籍入若耶溪詩云蟬噪林逾靜鳥鳴山更幽江南以為文外斷絶物無異議簡文吟詠不能忘之孝元諷味以為不可復得至懷舊志載於籍傳范陽盧詢祖鄴下才俊乃言此不成語何事於能魏收亦然其論詩云蕭蕭馬鳴悠悠旆旌毛傳曰言不喧譁也吾每歎此解有情致籍詩生於此意耳蘭陵蕭愨梁室上黃侯之子工於篇什嘗有秋詩云芙蓉露下落楊柳月中疏時人未之賞也吾愛其蕭散宛然在目潁川荀仲舉琅㖿諸葛漢亦以為爾而盧思道之徒雅所不愜何遜詩實為清巧多形似之言揚都論者恨其每病苦辛饒貧寒氣不及劉孝綽之雍容也雖然劉甚忌之平生誦何詩常云蘧車響北闕㦎㦎不道車又撰詩苑止取何兩篇時人譏其不廣劉孝綽當時既有重名無所與讓唯服謝朓常以謝詩置几案間動靜輒諷味簡文愛陶淵明文亦復如此江南語曰梁有三何子朗最多三何者遜及思澄子朗也子朗信饒清巧思澄遊廬山每有佳篇並為冠絶
