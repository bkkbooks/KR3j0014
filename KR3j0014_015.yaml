body:
  text: 養生篇十五神仙之事未可全誣但性命在天或難鍾值人生居世觸途牽縶幼少之日既有供養之勤成立之年便增妻孥之纍衣食資須公私驅役而望遁跡山林超然塵滓千萬不遇一爾加以金玉之費爐器所須益非貧士所辦學如牛毛成如麟角華山之下白骨如莽何有可遂之理考之內教縱使得仙終當有死不能出世不願汝曹專精於此若其愛養神明調護氣息慎節起臥均適寒暄禁忌食飲將餌藥物遂其所稟不為夭折者吾無間然諸藥餌法不廢世務也庾肩吾常服槐實年七十餘目看細字鬚髮猶黑鄴中朝士有單服杏仁枸杞黃精朮車前得益者甚多不能一一說爾吾嘗患齒搖動欲落飲食熱冷皆苦疼痛見抱朴子牢齒之法早朝叩齒三百下為良行之數日即便平愈今恆持之此輩小術無損於事亦可修也凡欲餌藥陶隱居太清方中總録甚備但須精審不可輕脫近有王愛州在鄴學服松脂不得節度腸塞而死為藥所誤者甚多夫養生先須慮禍全身保性有此生然後養之勿徒養其無生也單豹養於內而喪外張毅養於外而喪內前賢所戒也嵇康著養生之論而以傲物受刑石崇冀服餌之徵而以貪溺取禍往世之所迷也夫生不可不惜不可苟惜涉險畏之途干禍難之事貪欲以傷生讒慝而致死此君子之所惜哉行誠孝而見賊履仁義而得罪喪身以全家泯軀而濟國君子不咎也自亂離已來吾見名臣賢士臨難求生終為不救徒取窘辱令人憤悶侯景之亂王公將相多被戮辱妃主姬妾略無全者唯吳郡太守張嵊建義不捷為賊所害辭色不撓及鄱陽王世子謝夫人登屋詬怒見射而斃夫人謝遵女也何賢智操行若此之難婢妾引決若此之易悲夫
