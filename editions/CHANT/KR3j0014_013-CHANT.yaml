body:
  text: 止足篇十三禮云欲不可縱志不可滿宇宙可臻其極情性不知其窮唯在少欲知止為立涯限爾先祖靖侯戒子姪曰汝家書生門戶世無富貴自今仕宦不可過二千石婚姻勿貪勢家吾終身服膺以為名言也天地鬼神之道皆惡滿盈謙虛沖損可以免害人生衣趣以覆寒露食趣以塞飢乏爾形骸之內尚不得奢靡己身之外而欲窮驕泰耶周穆王秦始皇漢武帝富有四海貴為天子不知紀極猶自敗累況士庶乎常以為二十口家奴婢盛多不可出二十人良田十頃堂室纔蔽風雨車馬僅代杖策蓄財數萬以擬吉凶急速不啻此者以義散之不至此者勿非道求之仕宦稱泰不過處在中品前望五十人後顧五十人足以免恥辱無傾危也高此者便當罷謝偃仰私庭吾近為黃門郎已可收退當時羈旅懼罹謗讟思為此計僅未暇爾自喪亂已來見因託風雲徼倖富貴旦執機權夜填坑谷朔歡卓鄭晦泣顏原者非十人五人也慎之哉慎之哉
