body:
  text: 治家篇五夫風化者自上而行於下者也自先而施於後者也是以父不慈則子不孝兄不友則弟不恭夫不義則婦不順矣父慈而子逆兄友而弟傲夫義而婦陵則天之凶民乃刑戮之所攝非訓導之所移也笞怒廢於家則豎子之過立見刑罰不中則民無所措手足治家之寬猛亦猶國焉孔子曰奢則不遜儉則固與其不遜也寧固又云如有周公之才之美使驕且吝其餘不足觀也已然則可儉而不可吝也儉者省約為禮之謂也吝者窮急不䘏之謂也今有施則奢儉則吝如能施而不奢儉而不吝可矣生民之本要當稼穡而食桑麻以衣蔬果之蓄園場之所產雞豚之善塒圈之所生爰及棟宇器械樵蘇脂燭莫非種殖之物也至能守其業者閉門而為生之具以足但家無鹽井耳今北土風俗率能躬儉節用以贍衣食江南奢侈多不逮焉梁孝元世有中書舍人治家失度而過嚴刻妻妾遂共貨刺客伺醉而殺之世間名士但務寬仁至於飲食饟饋僮僕減損施惠然諾妻子節量狎侮賓客侵耗鄉黨此亦為家之巨蠹矣齊吏部侍郎房文烈未嘗嗔怒經霖雨絕糧遣婢糴米因爾逃竄三四許日方復擒之房徐曰舉家無食汝何處來竟無捶撻嘗寄人宅奴婢徹屋為薪略盡聞之顰蹙卒無一言裴子野有疎親故屬飢寒不能自濟者皆收養之家素清貧時逢水旱二石米為薄粥僅得遍焉躬自同之常無厭色鄴下有一領軍貪積已甚家童八百誓滿千人朝夕每人肴膳以十五錢為率遇有客旅便無以兼後坐事伏法籍其家產麻鞋一屋弊衣數庫其餘財寶不可勝言南陽有人為生奧博性殊儉吝冬至後女壻謁之乃設一銅甌酒數臠麞肉壻恨其單率一舉盡之主人愕然俛仰命益如此者再退而責其女曰某郎好酒故汝常貧及其死後諸子爭財兄遂殺弟婦主中饋惟事酒食衣服之禮耳國不可使預政家不可使幹蠱如有聰明才智識達古今正當輔佐君子助其不足必無牝雞晨鳴以致禍也江東婦女略無交遊其婚姻之家或十數年間未相識者惟以信命贈遺致殷勤焉鄴下風俗專以婦持門戶爭訟曲直造請逢迎車乘填街衢綺羅盈府寺代子求官為夫訴屈此乃恆代之遺風乎南間貧素皆事外飾車乘衣服必貴齊整家人妻子不免飢寒河北人事多由內政綺羅金翠不可廢闕羸馬顇奴僅充而已唱和之禮或爾汝之河北婦人織紝組紃之事黼黻錦繡羅綺之工大優於江東也太公曰養女太多一費也陳蕃曰盜不過五女之門女之為累亦以深矣然天生蒸民先人傳體其如之何世人多不舉女賊行骨肉豈當如此而望福於天乎吾有疏親家饒妓媵誕育將及便遣閽豎守之體有不安窺窗倚戶若生女者輒持將去母隨號泣莫敢救之使人不忍聞也婦人之性率寵子壻而虐兒婦寵壻則兄弟之怨生焉虐婦則姊妹之讒行焉然則女之行留皆得罪於其家者母實為之至有諺云落索阿姑餐此其相報也家之常弊可不誡哉婚姻素對靖侯成規近世嫁娶遂有賣女納財買婦輸絹比量父祖計校錙銖責多還少市井無異或猥壻在門或傲婦擅室貪榮求利反招羞恥可不慎歟借人典籍皆須愛護先有缺壞就為補治此亦士大夫百行之一也濟陽江祿讀書未竟雖有急速必待卷束整齊然後得起故無損敗人不厭其求假焉或有狼籍几案分散部秩多為童幼婢妾之所點汙風雨蟲鼠之所毀傷實為累德吾每讀聖人之書未嘗不肅敬對之其故紙有五經詞義及賢達姓名不敢穢用也吾家巫覡禱請絕於言議符書章醮亦無祈焉竝汝曹所見也勿為妖妄之費
