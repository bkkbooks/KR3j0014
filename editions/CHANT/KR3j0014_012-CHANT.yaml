body:
  text: 省事篇十二銘金人云無多言多言多敗無多事多事多患至哉斯戒也能走者奪其翼善飛者減其指有角者無上齒豐後者無前足蓋天道不使物有兼焉也古人云多為少善不如執一鼫鼠五能不成伎術近世有兩人朗悟士也性多營綜略無成名經不足以待問史不足以討論文章無可傳於集錄書迹未堪以留愛翫卜筮射六得三醫藥治十差五音樂在數十人下弓矢在千百人中天文畫繪棊博鮮卑語胡書煎胡桃油鍊錫為銀如此之類略得梗概皆不通熟惜乎以彼神明若省其異端當精妙也上書陳事起自戰國逮於兩漢風流彌廣原其體度攻人主之長短諫諍之徒也訐群臣之得失訟訴之類也陳國家之利害對策之伍也帶私情之與奪遊說之儔也總此四塗賈誠以求位鬻言以干祿或無絲毫之益而有不省之困幸而感悟人主為時所納初獲不貲之賞終陷不測之誅則嚴助朱買臣吾丘壽王主父偃之類甚眾良史所書蓋取其狂狷一介論政得失耳非士君子守法度者所為也今世所覩懷瑾瑜而握蘭桂者悉恥為之守門詣闕獻書言計率多空薄高自矜夸無經略之大體咸糠粃之微事十條之中一不足採縱合時務已漏先覺非謂不知但患知而不行耳或被發姦私面相酬證事途迴穴翻懼愆尤人主外護聲教脫加今含此乃僥倖之徒不足與比肩也諫諍之徒以正人君之失爾必在得言之地當盡匡贊之規不容苟免偷安垂頭塞耳至於就養有方思不出位干非其任斯則罪人故表記云事君遠而諫則諂也近而不諫則尸利也論語曰未信而諫人以為謗己也君子當守道崇德蓄價待時爵祿不登信由天命須求趨競不顧羞慚比較材能斟量功伐厲色揚聲東怨西怒或有劫持宰相瑕疵而獲酬謝或有諠聒時人視聽求見發遣以此得官謂為才力何異盜食致飽竊衣取溫哉世見躁競得官者便為弗索何獲不知時運之來不然亦至也見靜退未遇者便為弗為胡成不知風雲不與徒求無益也凡不求而自得求而不得者焉可勝算乎齊之季世多以財貨託附外家諠動女謁拜守宰者印組光華車騎輝赫榮兼九族取貴一時而為執政所患隨而伺察既以利得必以利殆微染風塵便乖肅正坑穽殊深瘡痏未復縱得免死莫不破家然後噬臍亦復何及吾自南及北未嘗一言與時人論身分也不能通達亦無尤焉王子晉云佐饔得嘗佐鬭得傷此言為善則預為惡則去不欲黨人非義之事也凡損於物皆無與焉然而窮鳥入懷仁人所憫況死士歸我當棄之乎伍員之託漁舟季布之入廣柳孔融之藏張儉孫嵩之匿趙歧前代之所貴而吾之所行也以此得罪甘心瞑目至如郭解之代人報讎灌夫之橫怒求地游俠之徒非君子之所為也如有逆亂之行得罪於君親者又不足䘏焉親友之迫危難也家財己力當無所吝若橫生圖計無理請謁非吾教也墨翟之徒世謂熱腹楊朱之侶世謂冷腸腸不可冷腹不可熱當以仁義為節文爾前在修文令曹有山東學士與關中太史競曆凡十餘人紛紜累歲內史牒付議官平之吾執論曰大抵諸儒所爭四分并減分兩家爾歷象之要可以晷景測之今驗其分至薄蝕則四分疏而減分密疏者則稱政令有寬猛運行致盈縮非算之失也密者則云日月有遲速以術求之預知其度無災祥也用疏則藏姦而不信用密則任數而違經且議官所知不能精於訟者以淺裁深安有肯服既非格令所司幸勿當也舉曹貴賤咸以為然有一禮官恥為此議苦欲留連強加考覈機杼既薄無以測量還復採訪訟人窺望長短朝夕聚議寒暑煩勞背春涉冬竟無與奪怨誚滋生赧然而退終為內史所迫此好名好事之辱也
