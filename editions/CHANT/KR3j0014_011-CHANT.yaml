body:
  text: 涉務篇十一夫君子之處世貴能有益於物耳不徒高談虛論左琴右書以費人君祿位也國之用材大較不過六事一則朝廷之臣取其鑒達治體經綸博雅二則文史之臣取其著述憲章不忘前古三則軍旅之臣取其斷決有謀強幹習事四則藩屏之臣取其明練風俗清白愛民五則使命之臣取其識變從宜不辱君命六則興造之臣取其程功節費開略有術此則皆勤學守行者所能辦也人性有長短豈責具美於六塗哉但當皆曉指趣能守一職便無媿耳吾見世中文學之士品藻古今若指諸掌及有試用多無所堪居承平之世不知有喪亂之禍處廟堂之下不知有戰陣之急保俸祿之資不知有耕稼之苦肆吏民之上不知有勞役之勤故難可以應世經務也晉朝南渡優借士族故江南冠帶有才幹者擢為令僕以下尚書郎中書舍人已上典掌機要其餘文義之士多迂誕浮華不涉世務纖微過失又惜行捶楚所以處於清名蓋護其短也至於臺閣令史主書監帥諸王籤省並曉習吏用濟辦時須縱有小人之態皆可鞭杖肅督故多見委使蓋用其長也人每不自量舉世怨梁武帝父子愛小人而疏士大夫此亦眼不能見其睫耳梁世士大夫皆尚襃衣博帶大冠高履出則車輿入則扶侍郊郭之內無乘馬者周弘正為宣城王所愛給一果下馬常服御之舉朝以為放達至乃尚書郎乘馬則糺劾之及侯景之亂膚脆骨柔不堪行步體羸氣弱不耐寒暑坐死倉猝者往往而然建康令王復性既儒雅未嘗乘騎見馬嘶歕陸梁莫不震懾乃謂人曰正是虎何故名為馬乎其風俗至此古人欲知稼穡之艱難斯蓋貴穀務本之道也夫食為民天民非食不生矣三日不粒父子不能相存耕種之茠鉏之刈穫之載積之打拂之簸揚之凡幾涉手而入倉廩安可輕農事而貴末業哉江南朝士因晉中興而渡江本為羈旅至今八九世未有力田悉資俸祿而食耳假令有者皆信僮僕為之未嘗目觀起一墢土耘一株苗不知幾月當下幾月當收安識世間餘務乎故治官則不了營家則不辦皆優閑之過也世有癡人不識仁義不知富貴並由天命為子娶婦恨其生資不足倚作舅姑之尊虵虺其性毒口加誣不識忌諱罵辱婦之父母卻成教以婦道不孝己身不顧他恨但憐己之子女不愛己之兒婦如此之人陰紀其過鬼奪其筭慎不可與為鄰仍不可與為援宜還之哉
