  - {type: variant, offset: 33279, length: 284, content: 卷終刻顔氏家訓序史壁曰書靡􅚘曷書也言靡範曷言也言書靡範雖聮篇縷章贅焉亡𥙷乃北齊顔黄門家訓質而明詳而要平而不詭盖序致至終篇罔不折衷今古㑹理道焉是可範矣璧少時家君東軒公甞援引為訓俾知嚮方顧其書雖晦菴小學間見一二然全帙寡傳莫獲考見頃得中秘本手自校録適遼陽傅太平以報政來就予索古書予岀之觀且語之故太平曰吾志也是惡可弗傳諸亟持歸刻焉夫振古渺邈經殘教荒馴至于今變趨愈下豈典範未甞究耶孰謂古道不可復哉乃若書之傳以禔身以範俗為今代人文風化之助則不獨顔氏一家之訓乎爾兹太平刻書之意也太平名鑰以司諫作郡有治行今為浙江副使嘉靖甲申夏六月望吉賜進士岀身翰林院侍講承徳郎經筵國史官南郡陽峯張壁序, WYG: ''}
