front:
  text: 寡妻之誨諭吾望此書為汝曹之所信猶賢於傳婢寡妻耳吾家風教素為整宻昔在齠齓便䝉誨誘每從兩兄曉夕温凊規行矩步安辭定色鏘鏘翼翼若朝嚴君焉賜以優言問所好尚勵短引長莫不懇篤年始九嵗便丁荼蓼家徒離散百口索然慈兄鞠養苦辛備至有仁無威導示不切雖讀禮傳微愛屬文頗為凡人之所陶染肆欲輕言不備邊幅年十八九少知砥礪習若自然卒難洗盪二十以後大過稀焉每常心共口敵性與情競夜覺曉非今悔昨失自憐無教以至於斯追思平昔之指銘肌鏤骨非徒古書之誡經目過耳故留此二十篇以為汝曹後範耳
