canonical_identifier: bkk:krp/KR3j0014/chant/v1/juan/1
seq: 1
body:
  text: 序致篇一夫聖賢之書教人誠孝慎言檢迹立身揚名亦已備矣魏晉以來所著諸子理重事復遞相模斆猶屋下架屋床上施床耳吾今所以復為此者非敢軌物範世也業以整齊門內提撕子孫夫同言而信信其所親同命而行行其所服禁童子之暴謔則師友之誡不如傅婢之指揮止凡人之鬭鬩則堯舜之道不如寡妻之誨諭吾望此書為汝曹之所信猶賢於傅婢寡妻耳吾家風教素為整密昔在齠齔便蒙誨誘每從兩兄曉夕溫凊規行矩步安辭定色鏘鏘翼翼若朝嚴君焉賜以優言問所好尚勵短引長莫不懇篤年始九歲便丁荼蓼家塗離散百口索然慈兄鞠養苦辛備至有仁無威導示不切雖讀禮傳微愛屬文頗為凡人之所陶染肆欲輕言不修邊幅年十八九少知砥礪習若自然卒難洗蕩二十以後大過稀焉每常心共口敵性與情競夜覺曉非今悔昨失自憐無教以至於斯追思平昔之指銘肌鏤骨非徒古書之誡經目過耳也故留此二十篇以為汝曹後範耳
