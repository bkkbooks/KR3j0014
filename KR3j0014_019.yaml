body:
  text: 雜藝篇十九真草書迹微須留意江南諺云書疏尺牘千里眉目也承晉宋餘俗相與事之故無頓狼狽者吾幼承門業加性愛重所見法書亦多而玩習功夫頗至遂不能佳者良由無分故也然而此藝不須過精夫巧者勞而智者憂常為人所役使更覺為纍韋仲將遺戒深有以也王逸少風流才士蕭散名人舉世唯知其書翻以能自蔽也蕭子雲每歎曰吾著齊書勒成一典文章弘義自謂可觀唯以筆迹得名亦異事也王褒地胄清華才學優敏後雖入關亦被禮遇猶以書工崎嶇碑碣之間辛苦筆硯之役嘗悔恨曰假使吾不知書可不至今曰邪以此觀之慎勿以書自命雖然廝猥之人以能書拔擢者多矣故道不同不相為謀也梁氏祕閣散逸以來吾見二王真草多矣家中嘗得十卷方知陶隱居阮交州蕭祭酒諸書莫不得羲之之體故是書之淵源蕭晚節所變乃是右軍年少時法也晉宋以來多能書者故其時俗遞相染尚所有部帙楷正可觀不無俗字非為大損至梁天監之間斯風未變大同之末訛替滋生蕭子雲改易字體邵陵王頗行偽字前上為草能傍作長之類是也朝野翕然以為楷式畫虎不成多所傷敗至為一字唯見數點或妄斟酌逐便轉移爾後墳籍略不可看北朝喪亂之餘書迹鄙陋加以專輒造字猥拙甚於江南乃以百念為憂言反為變不用為罷追來為歸更生為蘇先人為老如此非一遍滿經傳唯有姚元標工於楷隸留心小學後生師之者衆洎於齊末祕書繕寫賢於往日多矣江南閭里間有畫書賦此乃陶隱居弟子杜道士所為其人未甚識字輕為軌則託名貴師世俗傳信後生頗為所誤也畫繪之工亦為妙矣自古名士多或能之吾家嘗有梁元帝手畫蟬雀白團扇及馬圖亦難及也武烈太子偏能寫真坐上賓客隨宜點染即成數人以問童孺皆知其名矣蕭賁劉孝先劉靈並文學已外復佳此法玩閲古今特可寶愛若官未通顯每被公私使令亦為猥役吳郡顧士端出身湘東王國侍郎後為鎮南府刑獄參軍有子曰庭西朝中書舍人父子並有琴書之藝尤妙丹青常被元帝所使每懷羞恨彭城劉嶽橐之子也仕為驃騎府管記平氏縣令才學快士而畫絶倫後隨武陵王入蜀下牢之敗遂為陸護軍畫支江寺壁與諸工巧雜處向使三賢都不曉畫直運素業豈見此恥乎弧矢之利以威天下先王所以觀德擇賢亦濟身之急務也江南謂世之常射以為兵射冠冕儒生多不習此別有博射弱弓長箭施於準的揖讓升降以行禮焉防禦寇難了無所益亂離之後此術遂亡河北文士率曉兵射非直葛洪一箭已解追兵三九宴集常縻榮賜雖然要輕禽截狡獸不願汝輩為之卜筮者聖人之業也但近世無復佳師多不能中古者卜以決疑今人生疑於卜何者守道信謀欲行一事卜得惡卦反令恜恜此之謂乎且十中六七以為上手粗知大意又不委曲凡射奇偶自然半收何足賴也世傳云解陰陽者為鬼所嫉坎壈貧窮多不稱泰吾觀近古以來尤精妙者唯京房管輅郭璞耳皆無官位多或罹災此言令人益信儻值世網嚴密強負此名便有詿誤亦禍源也及星文風氣率不勞為之吾嘗學六壬式亦值世間好匠聚得龍首金匱玉燮玉曆十許種書討求無驗尋亦悔罷凡陰陽之術與天地俱生其吉凶德刑不可不信但去聖既遠世傳術書皆出流俗言辭鄙淺驗少妄多至如反支不行竟以遇害歸忌寄宿不免凶終拘而多忌亦無益也算術亦是六藝要事自古儒士論天道定律曆者皆學通之然可以兼明不可以專業江南此學殊少唯范陽祖烜精之位至南康太守河北多曉此術醫方之事取妙極難不勸汝曹以自命也微解藥性小小和合居家得以救急亦為勝事皇甫謐殷仲堪則其人也禮曰君子無故不徹琴瑟古來名士多所愛好洎於梁初衣冠子孫不知琴者號有所闕大同以末斯風頓盡然而此樂愔愔雅致有深味哉今世曲解雖變於古猶足以暢神情也唯不可令有稱譽見役勳貴處之下坐以取殘杯冷炙之辱戴安道猶遭之況爾曹乎家語曰君子不博為其兼行惡道故也論語云不有博奕者乎為之猶賢乎已然則聖人不用博奕為教但以學者不可常精有時疲倦則儻為之猶勝飽食昏睡兀然端坐耳至如吳太子以為無益命韋昭論之王肅葛洪陶侃之徒不許目觀手執此並勤篤之志也能爾為佳古為大博則六箸小博則二煢今無曉者比世所行一煢十二棊數術淺短不足可玩圍棊有手談坐隱之目頗為雅戲但令人耽憒廢喪實多不可常也投壺之禮近世愈精古者實以小豆為其矢之躍也今則唯欲其驍益多益喜乃有倚竿帶劍狼壺豹尾龍首之名其尤妙者有蓮花驍汝南周瑰弘正之子會稽賀徽賀革之子並能一箭四十餘驍賀又嘗為小障置壺其外隔障投之無所失也至鄴以來亦見廣寧蘭陵諸王有此校具舉國遂無投得一驍者彈棊亦近世雅戲消愁釋憒時可為之
