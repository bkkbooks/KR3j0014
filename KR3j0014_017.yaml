body:
  text: 書證篇十七詩云參差荇菜爾雅云荇萎余也字或為莕先儒解釋皆云水草圓葉細莖隨水淺深今是水悉有之黃花似蓴江南俗亦呼為豬蓴或呼為荇菜劉芳具有注釋而河北俗人多不識之博士皆以參差者是莧菜呼人莧為人荇亦可笑之甚詩云誰謂荼苦爾雅毛傳並以荼苦菜也又禮云苦菜秀案易統通卦驗玄圖曰苦菜生於寒秋更冬歷春得夏乃成今中原苦菜則如此也一名游冬葉似苦苣而細摘斷有白汁花黃似菊江南別有苦菜葉似酸漿其花或紫或白子大如珠熟時或赤或黑此菜可以釋勞案郭璞注爾雅此乃蘵黃蒢也今河北謂之龍葵梁世講禮者以此當苦菜既無宿根至春子方生耳亦大誤也又高誘注呂氏春秋曰榮而不實曰英苦菜當言英益知非龍葵也詩云有杕之杜江南本並木傍施大傳曰杕獨皃也徐仙民音徒計反說文曰杕樹皃也在木部韻集音次第之第而河北本皆為夷狄之狄讀亦如字此大誤也詩云駉駉牡馬江南書皆作牝牡之牡河北本悉為放牧之牧鄴下博士見難云駉頌既美僖公牧于坰野之事何限騲騭乎余答曰案毛傳云駉駉良馬腹幹肥張也其下又云諸侯六閑四種有良馬戎馬田馬駑馬若作放牧之意通於牝牡則不容限在良馬獨得駉駉之稱良馬天子以駕玉輅諸侯以充朝聘郊祀必無騲也周禮圉人職良馬匹一人駑馬麗一人圉人所養亦非騲也頌人舉其強駿者言之於義為得也易云良馬逐逐左傳云以其良馬二亦精駿之稱非通語也今以詩傳良馬通於牧騲恐失毛生之意且不見劉芳義證乎月令云荔挺出鄭玄注云荔挺馬薤也說文云荔似蒲而小根可為刷廣雅云馬薤荔也通俗文亦云馬藺易統通卦驗玄圖云荔挺不出則國多火災蔡邕月令章句云荔似挺高誘注呂氏春秋云荔草挺出也然則月令注荔挺為草名誤矣河北平澤率生之江東頗有此物人或種於階庭但呼為早蒲故不識馬薤講禮者乃以為馬莧馬莧堪食亦名豚耳俗曰馬齒江陵嘗有一僧面形上廣下狹劉緩幼子民譽年始數歲俊悟善體物見此僧云面似馬莧其伯父劉縚因呼為荔挺法師縚親講禮名儒尚誤如此詩云將其來施施毛傳云施施難進之意鄭箋云施施舒行皃也韓詩亦重為施施河北毛詩皆云施施江南舊本悉單為施俗遂是之恐為少誤詩云有渰萋萋興雲祁祁毛傳云渰陰雲皃萋萋雲行皃祁祁徐皃也箋云古者陰陽和風雨時其來祁祁然不暴疾也案渰已是陰雲何勞復云興雲祁祁耶雲當為雨俗寫誤耳班固靈臺詩云三光宣精五行布序習習祥風祁祁甘雨此其證也禮云定猶豫決嫌疑離騷曰心猶豫而狐疑先儒未有釋者案尸子曰五尺犬為猶說文云隴西謂犬子為猶吾以為人將犬行犬好豫在人前待人不得又來迎候如此往還至于終日斯乃豫之所以為未定也故稱猶豫或以爾雅曰猶如麂善登木猶獸名也既聞人聲乃豫緣木如此上下故稱猶豫狐之為獸又多猜疑故聽河冰無流水聲然後敢渡今俗云狐疑虎卜則其義也左傳曰齊侯痎遂痁說文云痎二日一發之瘧痁有熱瘧也案齊侯之病本是間日一發漸加重乎故為諸侯憂也今北方猶呼痎瘧音皆而世間傳本多以痎為疥杜征南亦無解釋徐仙民音介俗儒就為通云病疥令人惡寒變而成瘧此臆說也疥癬小疾何足可論寧有患疥轉作瘧乎尚書曰惟影響周禮云土圭測影影朝影夕孟子曰圖影失形莊子云罔兩問影如此等字皆當為光景之景凡陰景者因光而生故即謂為景淮南子呼為景柱廣雅云晷柱挂景並是也至晉世葛洪字苑傍始加彡音於景反而世間輒改治尚書周禮莊孟從葛洪字甚為失矣太公六韜有天陳地陳人陳雲鳥之陳論語曰衛靈公問陳於孔子左傳為魚麗之陳俗本多作阜傍車乘之車按諸陳字並作陳鄭之陳夫行陳之義取於陳列耳此於六書為假借也蒼雅及近世字書皆無別字唯王羲之小學章獨阜傍作車縱復俗行不宜追改六韜論語左傳也詩云黃鳥于飛集於灌木傳云灌木叢木也此乃爾雅之文故李巡注曰木叢生曰灌爾雅末章又云木族生為灌族亦叢聚也所以江南詩古本皆為叢聚之叢而古叢字似㝡字近世儒生因改為㝡解云木之㝡高長者案眾家爾雅及解詩無言此者唯周續之毛詩注音為徂會反劉昌宗詩注音為在公反又祖會反皆為穿鑿失爾雅訓也也是語已及助句之辭文籍備有之矣河北經傳悉略此字其間字有不可得無者至如伯也執殳於旅也語回也屢空風風也教也及詩傳云不戢戢也不儺儺也不多多也如斯之類儻削此文頗成廢闕詩言青青子衿傳曰青衿青領也學子之服按古者斜領下連於衿故謂領為衿孫炎郭璞注爾雅曹大家注列女傳並云衿交領也鄴下詩本既無也字群儒因謬說云青衿青領是衣兩處之名皆以青為飾用釋青青二字其失大矣又有俗學聞經傳中時須也字輒以意加之每不得所益誠可笑易有蜀才注江南學士遂不知是何人王儉四部目錄不言姓名題云王弼後人謝炅夏侯該並讀數千卷書皆疑是譙周而李蜀書一名漢之書云姓范名長生自稱蜀才南方以晉家渡江後北間傳記皆名為偽書不肯省讀故不見也禮王制云臝股肱鄭注云謂㩊衣出其臂脛今書皆作擐甲之擐國子博士蕭該云擐當作㩊音宣擐是穿著之名非出臂之義案字林蕭讀是徐爰音患非也漢書田肯賀上江南本皆作宵字沛國劉顯博覽經籍偏精班漢梁代謂之漢聖顯子臻不墜家業讀班史呼為田肯梁元帝嘗問之答曰此無義可求但臣家舊本以雌黃改宵字為肯元帝無以難之吾至江北見本為肯漢書王莽贊云紫色蛙聲餘分閏位蓋謂非玄黃之色不中律呂之音也近有學士名問甚高遂云王莽非直鳶髆虎視復紫色蛙聲亦為誤矣簡策字竹下施朿末代隸書似杞宋之宋亦有竹下遂為夾者猶如刺字之傍應為朿今亦作夾徐仙民春秋禮音遂以筴為正字以策為音殊為顛倒史記又作悉字誤而為述作妬字誤而為姤裴徐鄒皆以悉字音述以妬字音姤既爾亦可以亥為豕字音以帝為虎字音乎張揖云虙今伏羲氏也孟康漢書古文注亦云虙今伏而皇甫謐云伏羲或謂之宓羲按諸經史緯候遂無宓羲之號虙字從虍宓字從宀下俱為必末世傳寫遂誤以虙為宓而帝王世紀因誤更立名耳何以驗之孔子弟子虙子賤為單父宰即虙羲之後俗字亦為宓或復加山今兗州永昌郡城舊單父地也東門有子賤碑漢世所立乃曰濟南伏生即子賤之後是知虙之與伏古來通字誤以為宓較可知矣太史公記曰寧為雞口無為牛後此是刪戰國策耳按延篤戰國策音義曰尸雞中之主從牛子然則口當為尸後當為從俗寫誤也應劭風俗通云太史公記高漸離變名易姓為人庸保匿作於宋子久之作苦聞其家堂上有客擊筑伎癢不能無出言案伎癢者懷其伎而腹癢也是以潘岳射雉賦亦云徒心煩而伎癢今史記並作徘徊或作徬徨不能無出言是為俗傳寫誤爾太史公論英布曰禍之興自愛姬生於妬媚以至滅國又漢書外戚傳亦云成結寵妾妬媚之誅此二媚並當作媢媢亦妬也義見禮記三蒼且五宗世家亦云常山憲王后妬媢王充論衡云妬夫媢婦生則忿怒鬭訟益知媢是妬之別名原英布之誅為意賁赫耳不得言媚史記始皇本記二十八年丞相隗林丞相王綰等議於海上諸本皆作山林之林開皇二年五月長安民掘得秦時鐵稱權旁有銅塗鐫銘二所其一所曰廿六年皇帝盡并兼天下諸侯黔首大安立號為皇帝乃詔丞相狀綰法度量則不壹歉疑者皆壹明之凡四十字其一所曰元年制詔丞相斯去疾法度量盡始皇帝為之皆刻辭焉今襲號而刻辭不稱始皇帝其於久遠也如後嗣為之者不稱成功盛德刻此詔于左使毋疑凡五十八字一字磨滅見有五十七字了了分明其書兼為古隸余被敕寫讀之與內史令李德林對見此稱權今在官庫其丞相狀字乃為狀兒之狀爿旁作犬則知俗作隗林非也當為隗狀耳漢書云中外禔福字當從示禔安也音匙匕之匙義見蒼雅方言河北學士皆云如此而江南書本多誤從手屬文者對耦並為提挈之意恐為誤也或問漢書注為元后父名禁改禁中為省中何故以省代禁答曰案周禮宮正掌王宮之戒令糺禁鄭注云糺猶割也察也李登云省察也張揖云省今省詧也然則小井所領二反並得訓察其處既常有禁衛省察故以省代禁詧古察字也漢明帝紀為四姓小侯立學按桓帝加元服又賜四姓及梁鄧小侯帛是知皆外戚也明帝時外戚有樊氏郭氏陰氏馬氏為四姓謂之小侯者或以年小獲封故須立學耳或以侍祠猥朝侯非列侯故曰小侯禮云庶方小侯則其義也後漢書云鸛雀銜三鱓魚多假借為鱣鮪之鱣俗之學士因謂之為鱣魚案魏武四時食制鱣魚大如五斗奩長一丈郭璞注爾雅鱣長二三丈安有鸛雀能勝一者況三頭乎鱣又純灰色無文章也鱓魚長者不過三尺大者不過三指黃地黑文故都講云虵鱓卿大夫服之象也續漢書及搜神記亦說此事皆作鱓字孫卿云魚鱉鰌鱣及韓非說苑皆曰鱣似虵蠶似蠋並作鱣字假鱣為鱓其來久矣後漢書酷吏樊曄為天水郡守涼州為之歌曰寧見乳虎穴不入冀府寺而江南書本穴皆誤作六學士因循迷而不寤夫虎豹穴居事之較者所以班超云不探虎穴安得虎子寧當論其六七乎後漢書楊由傳云風吹削胏此是削札牘之柹耳古者書誤則削之故左傳云削而投之是也或即謂札為削王褒童約曰書削代牘蘇竟書云昔以摩研編削之才皆其證也詩云伐木滸滸毛傳云滸滸柹皃也史家假借為肝胏字俗本悉作脯腊之脯或為反哺之哺學士因解云削哺是屏障之名既無證據亦為妄矣此是風角占候耳風角書曰庶人風者拂地揚塵轉削若是屏障何由可轉也三輔決錄云前隊大夫范仲公鹽豉蒜果共一筩果當作塊顆之顆北土通呼物一凷改為一顆蒜顆是俗間常語耳故陳思王鷂雀賦曰頭如果蒜目似擘椒又道經云合口誦經聲璅璅眼中淚出珠子䂺其字雖異其音與義頗同江南但呼為蒜符不知謂為顆學士相承讀為裹結之裹言鹽與蒜共苞一裹內筩中耳正史削繁音義又音蒜顆為苦戈反皆失也有人訪吾曰魏志蔣濟上書云弊㩻之民是何字也余應之曰意為㩻即是𤿡倦之𤿡耳張揖呂忱並云支傍作刀劍之刀亦是剞字不知蔣氏自造支傍作筋力之力或借剞字終當音九偽反晉中興書太山羊曼常頹縱任俠飲酒誕節兗州號為濌伯此字更無音訓梁孝元帝嘗謂吾曰由來不識唯張簡憲見教呼為嚃羹之嚃自爾便遵承之亦不知所出簡憲是湘州刺史張纘謚也江南號為碩學案法盛世代殊近當是耆老相傳俗間又有濌濌語蓋無所不施無所不容之意也顧野王玉篇誤為黑傍沓顧雖博物猶出簡憲孝元之下而二人皆云重邊吾所見數本並無作黑者重沓是多饒積厚之意從黑更無義旨古樂府歌詞先述三子次及三婦婦是對舅姑之稱其末章云丈人且安坐調絃未遽央古者子婦供事舅姑旦夕在側與兒女無異故有此言丈人亦長老之目今世俗猶呼其祖考為先亡丈人又疑丈當為大北間風俗婦呼舅為大人公丈之與大易為誤耳近代文士頗作三婦詩乃為匹嫡並耦己之群妻之意又加鄭衛之辭大雅君子何其謬乎古樂府歌百里奚詞曰百里奚五羊皮憶別時烹伏雌吹扊扅今日富貴忘我為吹當作炊煮之炊案蔡邕月令章句曰鍵關牡也所以止扉或謂之剡移然則當時貧困并以門牡木作薪炊耳聲類作扊又或作扂通俗文世間題云河南服虔字子慎造虔既是漢人其敘乃引蘇林張揖蘇張皆是魏人且鄭玄以前全不解反語通俗反音甚為近俗阮孝緒又云李虔所造河北此書家藏一本遂無作李虔者晉中經簿及七志並無其目竟不得知誰制然其文義允愜實是高才殷仲堪常用字訓亦引服虔俗說今復無此書未知即是通俗文為當有異近代或更有服虔乎不能明也或問山海經夏禹及益所記而有長沙零陵桂陽諸暨如此郡縣不少以為何也答曰史之闕文為日久矣加復秦人滅學董卓焚書典籍錯亂非止於此譬猶本草神農所述而有豫章朱崖趙國常山奉高宜真定臨淄馮翊等郡縣名出諸藥物爾雅周公所作而云張仲孝友仲尼修春秋而經書孔丘卒世本左丘明所書而有燕王喜漢高祖汲冢瑣語乃載秦望碑蒼頡篇李斯所造而云漢兼天下海內并廁豨黥韓覆畔討滅殘列仙傳劉向所造而贊云七十四人出佛經列女傳亦向所造其子歆又作頌終于趙悼后而傳有更始韓夫人明德馬后及梁夫人嫕皆由後人所羼非本文也或問曰東宮舊事何以呼鴟尾為祠尾答曰張敞者吳人不甚稽古隨宜記注逐鄉俗訛謬造作書字耳吳人呼祠祀為鴟祀故以祠代鴟字呼紺為禁故以糸傍作禁代紺字呼盞為竹簡反故以木傍作展代盞字呼鑊字為霍字故以金傍作霍代鑊字又金傍作患為鐶字木傍作鬼為魁字火傍作庶為炙字既下作毛為髻字金花則金傍作華窗扇則木傍作扇諸如此類專輒不少又問東宮舊事六色罽䋿是何等物當作何音答曰按說文云莙牛藻也讀若威音隱塢瑰反即陸機所謂聚藻葉如蓬者也郭璞注三蒼亦云蘊藻之類也細葉蓬茸生然今水中有此物一節長數寸細茸如絲圓繞可愛長者二三十節猶呼為莙又寸斷五色絲橫著線股間繩之以象莙草用以飾物即名為莙于時當紺六色罽作此莙以飾緄帶張敞因造糸旁畏耳宜音隈柏人城東北有一孤山古書無載者唯闞駰十三州志以為舜納于大麓即謂此山其上今猶有堯祠焉世俗或呼為宣務山或呼為虛無山莫知所出趙郡士族有李穆叔季節兄弟李普濟亦為學問並不能定鄉邑此山余嘗為趙州佐共太原王邵讀柏人城西門內碑碑是漢桓帝時柏人縣民為縣令徐整所立銘云山有巏嵍王喬所仙方知此巏嵍山也巏字遂無所出務字依諸字書即旄丘之旄也旄字字林一音亡付反今依附俗名當音權務耳入鄴為魏收說之收大嘉歎值其為趙州莊嚴寺碑銘曰權務之精即用此也或問一夜何故五更更何所訓答曰漢魏以來謂為甲夜乙夜丙夜丁夜戊夜又云鼓一鼓二鼓三鼓四鼓五鼓亦云一更二更三更四更五更皆以五為節西都賦亦云衛以嚴更之署所以爾者假令正月建寅斗柄夕則指寅曉則指午矣自寅至午凡歷五辰冬夏之月雖復長短參差然辰間遼闊盈不至六縮不至四進退常在五者之間更歷也經也故曰五更爾爾雅云朮山薊也郭璞注云今朮似薊而生山中案朮葉其體似薊近世文士遂讀薊為筋肉之筋以耦地骨用之恐失其義或問俗名傀儡子為郭禿有故實乎答曰風俗通云諸郭皆諱禿當是前代人有姓郭而病禿者滑稽戲調故後人為其象呼為郭禿猶文康象庾亮耳或問曰何故名治獄參軍為長流乎答曰帝王世紀云帝少昊崩其神降于長流之山於祀主秋按周禮秋官司寇主刑罰長流之職漢魏捕賊掾耳晉宋以來始為參軍上屬司寇故取秋帝所居為嘉名焉客有難主人曰今之經典子皆謂非說文所言子皆云是然則許慎勝孔子乎主人撫掌大笑應之曰今之經典皆孔子手迹耶客曰今之說文皆許慎手迹乎答曰許慎檢以六文貫以部分使不得誤誤則覺之孔子存其義而不論其文也先儒尚得改文從意何況書寫流傳耶必如左傳止戈為武反正為乏皿蟲為蠱亥有二首六身之類後人自不得輒改也安敢以說文校其是非哉且余亦不專以說文為是也其有援引經傳與今乖者未之敢從又相如封禪書曰導一莖六穗於庖犧雙觡共抵之獸此導訓擇光武詔云非徒有豫養導擇之勞是也而說文云䆃是禾名引封禪書為證無妨自當有禾名䆃非相如所用也禾一莖六穗於庖豈成文乎縱使相如天才鄙拙強為此語則下句當云麟雙觡共抵之獸不得云犧也吾嘗笑許純儒不達文章之體如此之流不足憑信大抵服其為書隱括有條例剖析窮根源鄭玄注書往往引其為證若不信其說則冥冥不知一點一畫有何意焉世間小學者不通古今必依小篆是正書記凡爾雅三蒼說文豈能悉得蒼頡本指哉亦是隨代損益各有同異西晉已往字書何可全非但令體例成就不為專輒耳考校是非特須消息至如仲尼居三字之中兩字非體三蒼尼旁益丘說文居也下施几如此之類何由可從古無二字又多假借以中為仲以說為悅以召為邵以閒為閑如此之徒亦不勞改自有訛謬過成鄙俗亂旁為舌揖下無耳黿鼉從龜奮奪從雚席中加帶惡上安西鼓外設皮鑿頭生毀離則配禹壑乃施豁巫混經旁皋分澤片獵化為獦寵變成竉業左益片靈底著器率字自有律音強改為別單字自有善音輒析成異如此之類不可不治吾昔初看說文蚩薄世字從正則懼人不識隨俗則意嫌其非略是不得下筆也所見漸廣更知通變救前之執將欲半焉若文章著述猶擇微相影響者行之官曹文書世間尺牘幸不違俗也案彌亙字從二間舟詩云亙之秬秠是也今之隸書轉舟為日而何法盛中興書乃以舟在二間為舟航字謬也春秋說以人十四心為德詩說以二在天下為酉漢書以貨泉為白水真人新論以金昆為銀國志以天上有口為吳晉書以黃頭小人為恭宋書以召刀為邵參同契以人負告為造如此之例蓋數術謬語假借依附雜以戲笑耳如猶轉貢字為項以叱為七安可用此定文字音讀乎潘陸諸子離合詩賦栻卜破字經及鮑昭謎字皆取會流俗不足以形聲論之也河間邢芳語吾云賈誼傳云日中必熭注熭暴也曾見人解云此是暴疾之意正言日中不須臾卒然便昃耳此釋為當乎吾謂邢曰此語本出太公六韜案字書古者㬥曬字與㬥疾字相似唯下少異後人專輒加傍日耳言日中時必須㬥曬不爾者失其時也晉灼已有詳釋芳笑服而退
