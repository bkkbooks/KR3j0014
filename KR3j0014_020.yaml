body:
  text: 終制篇二十死者人之常分不可免也吾年十九值梁家喪亂其間與白刃為伍者亦常數輩幸承餘福得至於今古人云五十不為夭吾已六十餘故心坦然不以殘年為念先有風氣之疾常疑奄然聊書素懷以為汝誡先君先夫人皆未還建鄴舊山旅葬江陵東郭承聖末啓求揚都欲營遷厝蒙詔賜銀百兩已於揚州小郊北地燒磚便值本朝淪沒流離如此數十年間絶於還望今雖混一家道罄窮何由辦此奉營資費且揚都汙毀無復孑遺還被下濕未為得計自咎自責貫心刻髓計吾兄弟不當仕進但以門衰骨肉單弱五服之內傍無一人播越他鄉無復資廕使汝等沉淪廝役以為先世之恥故靦冒人間不敢墜失兼以北方政教嚴切全無隱退者故也今年老疾侵儻然奄忽豈求備禮乎一日放臂沐浴而已不勞復魄殮以常衣先夫人棄背之時屬世荒饉家塗空迫兄弟幼弱棺器率薄藏內無磚吾當松棺二寸衣帽已外一不得自隨床上唯施七星板至如蠟弩牙玉豚錫人之屬並須停省糧罌明器故不得營碑志旒旐彌在言外載以鱉甲車襯土而下平地無墳若懼拜掃不知兆域當築一堵低牆於左右前後隨為私記靈筵勿設枕几朔望祥禫唯下白粥清水乾棗不得有酒肉餅果之祭親友來餟酹者一皆拒之汝曹若違吾心有加先妣則陷父不孝在汝安乎其內典功德隨力所至勿刳竭生資使凍餒也四時祭祀周孔所教欲人勿死其親不忘孝道也求諸內典則無益焉殺生為之翻增罪纍若報罔極之德霜露之悲有時齊供及七月半盂蘭盆望於汝也孔子之葬親也云古者墓而不墳丘東西南北之人也不可以弗識也於是封之崇四尺然則君子應世行道亦有不守墳墓之時況為事際所逼也吾今羈旅身若浮雲竟未知何鄉是吾葬地唯當氣絶便埋之耳汝曹宜以傳業揚名為務不可顧戀朽壤以取湮沒也
