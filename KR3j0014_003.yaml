body:
  text: 兄弟篇三夫有人民而後有夫婦有夫婦而後有父子有父子而後有兄弟一家之親此三而已矣自茲以往至于九族皆本於三親焉故於人倫為重者也不可不篤兄弟者分形連氣之人也方其幼也父母左提右挈前襟後裾食則同案衣則傳服學則連業遊則共方雖有悖亂之人不能不相愛也及其壯也各妻其妻各子其子雖有篤厚之人不能不少衰也娣姒之比兄弟則疏薄矣今使疏薄之人而節量親厚之恩猶方底而圓蓋必不合矣唯友悌深至不為傍人之所移者免夫二親既歿兄弟相顧當如形之與影聲之與響愛先人之遺體惜己身之分氣非兄弟何念哉兄弟之際異於他人望深則易怨地親則易弭譬猶居室一穴則塞之一隙則塗之則無頽毀之慮如雀鼠之不恤風雨之不防壁陷楹淪無可救矣僕妾之為雀鼠妻子之為風雨甚哉兄弟不睦則子姪不愛子姪不愛則群從疏薄群從疏薄則僮僕為讎敵矣如此則行路皆踖其面而蹈其心誰救之哉人或交天下之士皆有歡愛而失敬於兄者何其能多而不能少也人或將數萬之師得其死力而失恩於弟者何其能疏而不能親也娣姒者多爭之地也使骨肉居之亦不若各歸四海感霜露而相思佇日月之相望也況以行路之人處多爭之地能無間者鮮矣所以然者以其當公務而執私情處重責而懷薄義也若能恕己而行換子而撫則此患不生矣人之事兄不可同於事父何怨愛弟不及愛子乎是反照而不明也沛國劉璡嘗與兄瓛連棟隔壁瓛呼之數聲不應良久方答瓛怪問之乃云向來未著衣帽故也以此事兄可以免矣江陵王玄紹弟孝英子敏兄弟三人特相愛友所得甘旨新異非共聚食必不先嘗孜孜色貌相見如不足者及西臺陷沒玄紹以形體魁梧為兵所圍二弟爭共抱持各求代死終不得解遂并命爾
