body:
  text: 風操篇六吾觀禮經聖人之教箕帚匕箸咳唾唯諾執燭沃盥皆有節文亦為至矣但既殘缺非復全書其有所不載及世事變改者學達君子自為節度相承行之故世號士大夫風操而家門頗有不同所見互稱長短然其阡陌亦自可知昔在江南目能視而見之耳能聽而聞之蓬生麻中不勞翰墨汝曹生於戎馬之間視聽之所不曉故聊記録以傳示子孫禮云見似目瞿聞名心瞿有所感觸惻愴心眼若在從容平常之地幸須申其情耳必不可避亦當忍之猶如伯叔兄弟酷類先人可得終身腸斷與之絶耶又臨文不諱廟中不諱君所無私諱益知聞名須有消息不必期於顛沛而走也梁世謝舉甚有聲譽聞諱必哭為世所譏又臧逢世臧嚴之子也篤學修行不墜門風孝元經牧江州遣往建昌督事郡縣民庶競修箋書朝夕輻輳几案盈積書有稱嚴寒者必對之流涕不省取記多廢公事物情怨駭竟以不辦而還此並過事也近在揚都有一士人諱審而與沈氏交結周厚沈與其書名而不姓此非人情也凡避諱者皆須得其同訓以代換之桓公名白博有五皓之稱厲王名長琴有修短之目不聞謂布帛為布皓呼腎腸為腎修也梁武小名阿練子孫皆呼練為絹乃謂銷鍊物為銷絹物恐乖其義或有諱雲者呼紛紜為紛煙有諱桐者呼梧桐樹為白鐵樹便似戲笑耳周公名子曰禽孔子名兒曰鯉止在其身自可無禁至若衛侯韓公子楚太子皆名蟣虱長卿名犬子王修名狗子上有連及理未為通古之所行今之所笑也北土多有名兒為驢駒豚子者使其自稱及兄弟所名亦何忍哉前漢有尹翁歸後漢有鄭翁歸梁家亦有孔翁歸又有顧翁寵晉代有許思妣孟少孤如此名字幸當避之今人避諱更急於古名子者當為孫地吾親識中有諱襄諱友諱同諱清諱和諱禹交疏造次一座百犯聞者辛苦無憀賴焉昔司馬長卿慕藺相如故名相如顧元歎慕蔡雍故名雍而後漢有朱倀字孫卿許暹字顏回梁世有庾晏嬰祖孫登連古人姓為名字亦鄙事也昔劉文饒不忍罵奴為畜産今世愚人遂以相戲或有指名為豚犢者有識傍觀猶欲掩耳況當之者乎近在議曹共平章百官秩祿有一顯貴當世名臣意嫌所議過厚齊朝有一兩士族文學之人謂此貴曰今日天下大同須為百代典式豈得尚作關中舊意乎明公定是陶朱公大兒耳彼此歡笑不以為嫌昔侯霸之子孫稱其祖父曰家公陳思王稱其父為家父母為家母潘尼稱其祖曰家祖古人之所行今人之所笑也今南北風俗言其祖及二親無云家者田里猥人方有此言耳凡與人言言己世父以次第稱之不云家者以尊於父不敢家也凡言姑姊妹女子子已嫁則以夫氏稱之在室則以次第稱之言禮成他族不得云家也子孫不得稱家者輕略之也蔡雍書集呼其姑姊為家姑家姊班固書集亦云家孫今並不行也凡與人言稱彼祖父母世父母父母及長姑皆加尊字自叔父母已下則加賢字尊卑之差也王羲之書稱彼之母與自稱己母同不云尊字今所非也南人冬至歲首不詣喪家若不修書則過節束帶以申慰北人至歲之日重行弔禮禮無明文則吾不取南人賓至不迎相見捧手而不揖送客下席而已北人迎送並至門相見則揖皆古之道也吾善其迎揖昔者王侯自稱孤寡不穀自茲以降雖孔子聖師與門人言皆稱名也後雖有臣僕之稱行者蓋亦寡焉江南輕重各有謂號具諸書儀北人多稱名者乃古之遺風吾善其稱名焉言及先人理當感慕古者之所易今人之所難江南人事不獲已須言閥閲必以文翰罕有面論者北人無何便爾話説及相訪問如此之事不可加於人也人加諸己則當避之名位未高如為勳貴所逼隱忍方便速報取了勿使煩重感辱祖父若沒言須及者則斂容肅坐稱大門中世父叔父則稱從兄弟門中兄弟則稱亡者子某門中各以其尊卑輕重為容色之節皆變於常若與君言雖變於色猶云亡祖亡伯亡叔也吾見名士亦有呼其亡兄弟為兄子弟子門中者亦未為安帖也北土風俗都不行此太山羊侃梁初入南吾近至鄴其兄子肅訪侃委曲吾答之云卿從門中在梁如此如此肅曰是我親第七亡叔非從也祖孝徵在坐先知江南風俗乃謂之云賢從弟門中何故不解古人皆呼伯父叔父而今世多單呼伯叔從父兄弟姊妹已孤而對其前呼其母為伯叔母此不可避者也兄弟之子已孤與他人言對孤者前呼為兄子弟子頗為不忍北土人多呼為姪案爾雅喪服經左傳姪名雖通男女並是對姑之稱晉世已來始呼叔姪今呼為姪於理為勝也別易會難古人所重江南餞送下泣言離有王子侯梁武帝弟出為東郡與武帝別帝曰我年已老與汝分張甚以惻愴數行淚下侯遂密雲赧然而出坐此被責飄颻舟渚一百許日卒不得去北間風俗不屑此事歧路言離歡笑分首然人性自有少涕淚者腸雖欲絶目猶爛然如此之人不可強責凡親屬名稱皆須粉墨不可濫也無風教者其父已孤呼外祖父母與祖父母同使人為其不喜聞也雖質於面皆當加外以別之父母之世叔父皆當加其次第以別之父母之世叔母皆當加其姓以別之父母之群從世叔父母及從祖父母皆當加其爵位若姓以別之河北士人皆呼外祖父母為家公家母江南田里間亦言之以家代外非吾所識凡宗親世數有從父有從祖有族祖江南風俗自茲已往高秩者通呼為尊同昭穆者雖百世猶稱兄弟若對他人稱之皆云族人河北士人雖三二十世猶呼為從伯從叔梁武帝嘗問一中土人曰卿北人何故不知有族答云骨肉易疏不忍言族耳當時雖為敏對於禮未通吾嘗問周弘讓曰父母中外姊妹何以稱之周曰亦呼為丈人自古未見丈人之稱施於婦人也吾親表所行若父屬者為某姓姑母屬者為某姓姨中外丈人之婦猥俗呼為丈母士大夫謂之王母謝母云而陸機集有與長沙顧母書乃其從叔母也今所不行齊朝士子皆呼祖僕射為祖公全不嫌有所涉也乃有對面以相戲者古者名以正體字以表德名終則諱之字乃可以為孫氏孔子弟子記事者皆稱仲尼呂后微時嘗字高祖為季至漢袁種字其叔父曰絲王丹與侯霸子語字霸為君房江南至今不諱字也河北士人全不辨之名亦呼為字字固呼為字尚書王元景兄弟皆號名人其父名雲字羅漢一皆諱之其餘不足怪也禮間傳云斬縗之哭若往而不反齊縗之哭若往而反大功之哭三曲而哀小功緦麻哀容可也此哀之發於聲音也孝經云哭不哀皆論哭有輕重質文之聲也禮以哭有言者為號然則哭亦有辭也江南喪哭時有哀訴之言耳山東重喪則唯呼蒼天期功以下則唯呼痛深便是號而不哭江南凡遭重喪若相知者同在城邑三日不弔則絶之除喪雖相遇則避之怨其不己憫也有故及道遙者致書可也無書亦如之北俗則不爾江南凡弔者主人之外不識者不執手識輕服而不識主人則不於會所而弔他日修名詣其家陰陽説云辰為水墓又為土墓故不得哭王充論衡云辰日不哭哭則重喪今無教者辰日有喪不問輕重舉家清謐不敢發聲以辭弔客道書又曰晦歌朔哭皆當有罪天奪之算喪家朔望哀感彌深寧當惜壽又不哭也亦不諭偏傍之書死有歸殺子孫逃竄莫肯在家畫瓦書符作諸厭勝喪出之日門前然火戶外列灰祓送家鬼章斷注連凡如此比不近有情乃儒雅之罪人彈議所當加也己孤而履歲及長至之節無父拜母祖父母世叔父母姑兄姊則皆泣無母拜父外祖父母舅姨兄姊亦如之此人情也江左朝臣子孫初釋服朝見二宮皆當泣涕二宮為之改容頗有膚色充澤無哀感者梁武薄其為人多被抑退裴政出服問訊武帝貶瘦枯稿涕泗滂沱武帝目送之曰裴之禮不死也二親既歿所居齋寢子與婦弗忍入焉北朝頓丘李構母劉氏夫人亡後所住之堂終身鎖閉弗忍開入也夫人宋廣州刺史纂之孫女故構猶染江南風教其父獎為揚州刺史鎮壽春遇害構嘗與王松年祖孝徵數人同集談宴孝徵善畫遇有紙筆圖寫為人頃之因割鹿尾戲截畫人以示構而無他意構愴然動色便起就馬而去舉坐驚駭莫測其情祖君尋悟方深反側當時罕有能感此者吳郡陸襄父間被刑襄終身布衣蔬飯雖薑菜有切割皆不忍食居家惟以掐摘供廚江陵姚子篤母以燒死終身不忍噉炙豫章熊康父以醉而為奴所殺終身不復嘗酒然禮緣人情恩由義斷親以噎死亦當不可絶食也禮經父之遺書母之杯圈感其手口之澤不忍讀用政為常所講習讎校繕寫及偏加服用有迹可思者耳若尋常墳典為生什物安可悉廢之乎既不讀用無容散逸唯當緘保以留後世耳思魯等第四舅母親吳郡張建女也有第五妹三歲喪母靈床上屏風平生舊物屋漏沾溼出曝曬之女子一見伏床流涕家人怪其不起乃往抱持薦席淹漬精神傷沮不能飲食將以問醫醫診脈云腸斷矣因爾便吐血數日而亡中外憐之莫不悲歎禮云忌日不樂正以感慕罔極惻愴無聊故不接外賓不理衆務耳必能悲慘自居何限於深藏也世人或端坐奧室不妨言笑盛營甘美厚供齋食迫有急卒密戚至交盡無相見之理蓋不知禮意乎魏世王修母以社日亡來歲社日修感念哀甚鄰里聞之為之罷社今二親喪亡偶值伏臘分至之節及月小晦後忌之外所經此日猶應感慕異於餘辰不預飲宴聞聲樂及行遊也劉縚緩兄弟並為名器其父名昭一生不為照字唯依爾雅火傍作召耳然凡文與正諱相犯當自可避其有同音異字不可悉然劉字之下即有昭音呂尚之兒如不為上趙一之子儻不作一便是下筆即妨是書皆觸也嘗有甲設宴席請乙為賓而旦於公庭見乙之子問之曰尊侯早晚顧宅乙子稱其父已往時以為笑如此比例觸類慎之不可陷於輕脫江南風俗兒生一期為製新衣盥浴裝飾男則用弓矢紙筆女則刀尺針縷並加飲食之物及珍寶服玩置之兒前觀其發意所取以驗貪廉愚智名之為試兒親表聚集致燕享焉自茲已後二親若在每至此日嘗有酒食之事耳無教之徒雖已孤露其日皆為供頓酣暢聲樂不知有所感傷梁孝元年少之時每八月六日載誕之辰常設齋講自阮修容薨歿之後此事亦絶人有憂疾則呼天地父母自古而然今世諱避觸途急切而江東士庶痛則稱禰禰是父之廟號父在無容稱廟父歿何容輒呼蒼頡篇有倄字訓詁云痛而呼也音羽罪反今北人痛則呼之聲類音于耒反今南人痛或呼之此二音隨其鄉俗並可行也梁世被繫劾者子孫弟姪皆詣闕三日露跣陳謝子孫有官自陳解職子則草屩粗衣蓬頭垢面周章道路要候執事叩頭流血申訴冤枉若配徒隸諸子並立草菴於所署門不敢寧宅動經旬日官司驅遣然後始退江南諸憲司彈人事事雖不重而以教義見辱者或被輕繫而身死獄戶者皆為怨讎子孫三世不交通矣到洽為御史中丞初欲彈劉孝綽其兄溉先與劉善苦諫不得乃詣劉涕泣告別而去兵凶戰危非安全之道古者天子喪服以臨師將軍鑿凶門而出父祖伯叔若在軍陳貶損自居不宜奏樂宴會及婚冠吉慶事也若居圍城之中憔悴容色除去飾玩常為臨深履薄之狀焉父母疾篤醫雖賤雖少則涕泣而拜之以求哀也梁孝元在江州嘗有不豫世子方等親拜中兵參軍李猷焉四海之人結為兄弟亦何容易必有志均義敵令終如始者方可議之一爾之後命子拜伏呼為丈人申父友之敬身事彼親亦宜加禮比見北人甚輕此節行路相逢便定昆季望年觀貌不擇是非至有結父為兄託子為弟者昔者周公一沐三握髮一飯三吐餐以接白屋之士一日所見者七十餘人晉文公以沐辭豎頭須致有圖反之誚門不停賓古所貴也失教之家閽寺無禮或以主君寢食嗔怒拒客未通江南深以為恥黃門侍郎裴之禮號善為士大夫有如此輩對賓杖之其門生僮僕接於他人折旋俯仰辭色應對莫不肅敬與主無別也
