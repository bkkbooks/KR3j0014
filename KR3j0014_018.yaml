body:
  text: 音辭篇十八夫九州之人言語不同生民已來固常然矣自春秋摽齊言之傳離騷目楚詞之經此蓋其較明之初也後有揚雄著方言其書大備然皆考名物之同異不顯聲讀之是非也逮鄭玄注六經高誘解呂覽淮南許慎造説文劉熹製釋名始有譬況假借以證音字耳而古語與今殊別其間輕重清濁猶未可曉加以外言內言急言徐言讀若之類益使人疑孫叔然創爾雅音義是漢末人獨知反語至於魏世此事大行高貴鄉公不解反語以為怪異自茲厥後音韻鋒出各有土風遞相非笑指馬之諭未知孰是共以帝王都邑參校方俗考核古今為之折衷榷而量之獨金陵與洛下耳南方水土和柔其音清舉而切詣失在浮淺其辭多鄙俗北方山川深厚其音沈濁而鈋鈍得其質直其辭多古語然冠冕君子南方為優閭里小人北方為愈易服而與之談南方士庶數言可辨隔垣而聽其語北方朝野終日難分而南染吳越北雜夷虜皆有深弊不可具論其謬失輕微者則南人以錢為涎以石為射以賤為羡以是為舐北人以庶為戍以如為儒以紫為姊以洽為狎如此之例兩失甚多至鄴已來唯見崔子約崔瞻叔姪李祖仁李蔚兄弟頗事言詞少為切正李季節著音韻決疑時有錯失陽休之造切韻殊為疏野吾家兒女雖在孩稚便漸督正之一言訛替以為己罪矣云為品物未考書記者不敢輒名汝曹所知也古今言語時俗不同著述之人楚夏各異蒼頡訓詁反椑為逋賣反娃為於乖戰國策音刎為免穆天子傳音諫為間説文音戛為棘讀皿為猛字林音看為口甘反音伸為辛韻集以成仍宏登合成兩韻為奇益石分作四章李登聲類以系音羿劉昌宗周官音讀乘若承此例甚廣必須考校前世反語又多不切徐仙民毛詩音反驟為在遘左傳音切椽為徒緣不可依信亦為衆矣今之學士語亦不正古獨何人必應隨其訛僻乎通俗文曰入室求曰搜反為兄侯然則兄當音所榮反今北俗通行此音亦古語之不可用者璵璠魯人寶玉當音餘煩江南皆音藩屏之藩岐山當音為奇江南皆呼為神祇之祇江陵陷沒此音被於關中不知二者何所承案以吾淺學未之前聞也北人之音多以舉莒為矩唯李季節云齊桓公與管仲於臺上謀伐莒東郭牙望見桓公口開而不閉故知所言者莒也然則莒矩必不同呼此為知音矣夫物體自有精粗精粗謂之好惡人心有所去取去取謂之好惡此音見於葛洪徐邈而河北學士讀尚書云好生惡殺是為一論物體一就人情殊不通矣甫者男子之美稱古書多假借為父字北人遂無一人呼為甫者亦所未喻唯管仲范增之號須依字讀耳案諸字書焉字鳥名或云語詞皆音於愆反自葛洪要用字苑分焉字音訓若訓何訓安當音於愆反於焉逍遙於焉嘉客焉用佞焉得仁之類是也若送句及助詞當音矣愆反故稱龍焉故稱血焉有民人焉有社稷焉託始焉爾晉鄭焉依之類是也江南至今行此分別昭然易曉而河北混同一音雖依古讀不可行於今也邪者未定之詞左傳曰不知天之棄魯邪抑魯君有罪於鬼神邪莊子云天邪地邪漢書云是邪非邪之類是也而北人即呼為也字亦為誤矣難者曰繫辭云乾坤易之門戶邪此又為未定辭乎答曰何為不爾上先標問下方列德以折之耳江南學士讀左傳口相傳述自為凡例軍自敗曰敗打破人軍曰敗諸記傳未見補敗反徐仙民讀左傳唯一處有此音又不言自敗敗人之別此為穿鑿耳古人云膏粱難整以其為驕奢自足不能剋勵也吾見王侯外戚語多不正亦由內染賤保傅外無良師友故耳梁世有一侯嘗對元帝飲謔自陳癡鈍乃成颸段元帝答之云颸異涼風段非干木謂郢州為永州元帝啓報簡文簡文云庚辰吳入遂成司隸如此之類舉口皆然元帝手教諸子侍讀以此為誡河北反攻字為古琮與工公功三字不同殊為僻也比世有人名暹自稱為纖名琨自稱為袞名洸自稱為汪名䋤自稱為獡非唯音韻舛錯亦使其兒孫避諱紛紜矣
